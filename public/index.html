// ── Supabase Auth & DB ────────────────────────────────────────────────────────
async function sbFetch(path, options={}) {
  const headers = {
    "apikey": SUPABASE_KEY,
    "Content-Type": "application/json",
    ...options.headers
  };
  if (state.session?.access_token) {
    headers["Authorization"] = `Bearer ${state.session.access_token}`;
  } else {
    headers["Authorization"] = `Bearer ${SUPABASE_KEY}`;
  }
  return fetch(`${SUPABASE_URL}${path}`, { ...options, headers });
}

async function signUp(email, password) {
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: "POST",
      headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    return data;
  } catch(e) {
    return { error: e.message };
  }
}

async function signIn(email, password) {
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    return data;
  } catch(e) {
    return { error: e.message };
  }
}

async function signOut() {
  await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
    method: "POST",
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${state.session?.access_token}` }
  });
  setState({ session: null, user: null });
  showToast("Signed out");
}

async function getAttendance(eventId) {
  const r = await sbFetch(`/rest/v1/attendance?event_id=eq.${encodeURIComponent(eventId)}&select=count`);
  if (!r.ok) return 0;
  const d = await r.json();
  return d[0]?.count || 0;
}

async function getAttendanceCounts(eventIds) {
  if (!eventIds.length) return {};
  const ids = eventIds.map(id => `event_id.eq.${encodeURIComponent(id)}`).join(",");
  const r = await sbFetch(`/rest/v1/attendance?or=(${ids})`);
  if (!r.ok) return {};
  const d = await r.json();
  const counts = {};
  d.forEach(row => {
    counts[row.event_id] = (counts[row.event_id] || 0) + 1;
  });
  return counts;
}

async function toggleAttendance(eventId, eventName) {
  const userId = state.user?.id;
  if (!userId) {
    setState({ authModal: "signin", authRedirect: eventId });
    return;
  }
  const isGoing = state.going.has(eventId);
  if (isGoing) {
    await sbFetch(`/rest/v1/attendance?event_id=eq.${encodeURIComponent(eventId)}&user_id=eq.${userId}`, {
      method: "DELETE"
    });
    const newGoing = new Set(state.going);
    newGoing.delete(eventId);
    const newCounts = { ...state.attendanceCounts };
    newCounts[eventId] = Math.max(0, (newCounts[eventId] || 1) - 1);
    setState({ going: newGoing, attendanceCounts: newCounts });
    showToast("Removed from going");
  } else {
    await sbFetch(`/rest/v1/attendance`, {
      method: "POST",
      headers: { "Prefer": "return=minimal" },
      body: JSON.stringify({ event_id: eventId, event_name: eventName, user_id: userId })
    });
    const newGoing = new Set(state.going);
    newGoing.add(eventId);
    const newCounts = { ...state.attendanceCounts };
    newCounts[eventId] = (newCounts[eventId] || 0) + 1;
    setState({ going: newGoing, attendanceCounts: newCounts });
    showToast("✓ You're going!");
  }
}

async function getUserGoing(userId) {
  if (!userId) return new Set();
  const r = await sbFetch(`/rest/v1/attendance?user_id=eq.${userId}&select=event_id`);
  if (!r.ok) return new Set();
  const d = await r.json();
  return new Set(d.map(row => row.event_id));
}

async function submitReview(eventId, eventName, rating, comment) {
  const r = await sbFetch(`/rest/v1/reviews`, {
    method: "POST",
    headers: { "Prefer": "return=minimal" },
    body: JSON.stringify({ event_id: eventId, event_name: eventName, rating, comment, created_at: new Date().toISOString() })
  });
  return r.ok;
}

async function fetchReviews(eventId) {
  const r = await sbFetch(`/rest/v1/reviews?event_id=eq.${encodeURIComponent(eventId)}&order=created_at.desc&limit=5`);
  return r.ok ? await r.json() : [];
}

function resolveSearch(input){
  const t=input.trim();
  if(/^\d{5}$/.test(t))return{zip:t,fromCity:false};
  const key=t.toLowerCase();
  const match=CITY_ZIP[key];
  if(match)return{...match,fromCity:true};
  const partial=Object.keys(CITY_ZIP).find(k=>k.startsWith(key));
  if(partial)return{...CITY_ZIP[partial],fromCity:true};
  return null;
}
function getSuggestions(input){
  if(!input||input.length<2)return[];
  const key=input.toLowerCase();
  return Object.entries(CITY_ZIP).filter(([k])=>k.startsWith(key)||k.includes(key)).slice(0,5).map(([,v])=>v);
}

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function formatDate(d){
  if(!d)return"TBD";
  try{
    const dt=new Date(d+"T00:00:00");
    const today=new Date();today.setHours(0,0,0,0);
    const diff=Math.round((dt-today)/(1000*60*60*24));
    if(diff===0)return"Today";
    if(diff===1)return"Tomorrow";
    if(diff<=6)return dt.toLocaleDateString("en-US",{weekday:"long"});
    return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  }catch{return d;}
}
function isThisWeekend(ds){
  if(!ds)return false;
  const t=new Date();t.setHours(0,0,0,0);
  const day=t.getDay();
  const fri=new Date(t);fri.setDate(t.getDate()+((5-day+7)%7));
  const sun=new Date(t);sun.setDate(t.getDate()+((7-day)%7||7));
  const ev=new Date(ds+"T00:00:00");
  return ev>=fri&&ev<=sun;
}
function withinDays(ds,days){
  if(!ds)return true;
  const today=new Date();today.setHours(0,0,0,0);
  const cutoff=new Date(today);cutoff.setDate(today.getDate()+days);
  const ev=new Date(ds+"T00:00:00");
  return ev>=today&&ev<=cutoff;
}
function getWeather(ds,r){
  const W={VA:[{i:"🌨",l:"38°",t:"Cold"},{i:"🌦",l:"52°",t:"Cool"},{i:"🌤",l:"62°",t:"Mild"},{i:"⛅",l:"70°",t:"Nice"},{i:"☀",l:"78°",t:"Warm"},{i:"🌡",l:"88°",t:"Hot"},{i:"🌡",l:"90°",t:"Hot"},{i:"🌡",l:"88°",t:"Hot"},{i:"☀",l:"80°",t:"Warm"},{i:"🌤",l:"68°",t:"Mild"},{i:"🌥",l:"56°",t:"Cool"},{i:"🌨",l:"44°",t:"Cold"}],DEFAULT:[{i:"❄",l:"32°",t:"Cold"},{i:"🌥",l:"42°",t:"Cold"},{i:"🌤",l:"55°",t:"Mild"},{i:"⛅",l:"65°",t:"Nice"},{i:"☀",l:"72°",t:"Warm"},{i:"🌡",l:"82°",t:"Hot"},{i:"🌡",l:"85°",t:"Hot"},{i:"🌡",l:"83°",t:"Hot"},{i:"☀",l:"75°",t:"Warm"},{i:"🌤",l:"63°",t:"Cool"},{i:"🌥",l:"50°",t:"Cool"},{i:"❄",l:"38°",t:"Cold"}]};
  const mo=new Date((ds||"2026-07-01")+"T00:00:00").getMonth();
  return(W[r]||W.DEFAULT)[mo];
}

async function doSearch(input,regionOverride){
  const resolved=regionOverride||resolveSearch(input);
  if(!resolved){setState({searchError:`Couldn't find "${input}". Try a city name or ZIP.`});return;}
  const zip=resolved.zip;
  const info=resolved.city?resolved:getRegionInfo(zip);
  const fallback=generateFallback(zip,info);
  setState({loading:false,liveLoading:true,screen:"results",events:fallback,openId:null,typeFilter:"All",whoFilter:"all",freeOnly:false,dateRange:"3months",liveData:false,liveLoading:false,info,zip,searchError:"",attendanceCounts:{},viewMode:"list"});
  
  // Fetch attendance counts for fallback events
  loadAttendanceCounts(fallback.map(e=>e.id));
  
  // Phase 2 - live events
  try{
    const coordParams=state.userLat&&state.userLng?`&lat=${state.userLat}&lng=${state.userLng}`:"";
    const res=await fetch(`${PROXY_URL}?zip=${zip}${coordParams}`);
    if(!res.ok)throw new Error("API error");
    const data=await res.json();
    if(data.events&&data.events.length>0){
      const liveEvents=data.events.map(ev=>({
        ...ev,emoji:m2(ev.type).icon,photo:ev.image||getPhoto(ev.type,ev.id),
        weather:getWeather(ev.startDate,getRegionInfo(zip).region),
        isWeekend:isThisWeekend(ev.startDate),date:ev.startDate,
        sched:ev.subEvents?.map(s=>`${s.time} · ${s.name}`)||[],
        rating:ev.familyRating||4,who:["all"],
      }));
      const liveNames=new Set(liveEvents.map(e=>e.name.toLowerCase().slice(0,15)));
      const uniqueFallback=fallback.filter(e=>!liveNames.has(e.name.toLowerCase().slice(0,15)));
      const merged=[...liveEvents,...uniqueFallback];
      merged.sort((a,b)=>{
        if(!a.date&&!b.date)return 0;
        if(!a.date)return 1;
        if(!b.date)return -1;
        if(a.distanceMiles!=null&&b.distanceMiles!=null){
          const bandA=a.distanceMiles<10?0:a.distanceMiles<25?1:a.distanceMiles<50?2:3;
          const bandB=b.distanceMiles<10?0:b.distanceMiles<25?1:b.distanceMiles<50?2:3;
          if(bandA!==bandB)return bandA-bandB;
        }
        return a.date.localeCompare(b.date);
      });
      const fromCache=data.fromCache===true;
      setState({events:merged,liveLoading:false,liveData:true,fromCache});
      loadAttendanceCounts(merged.map(e=>e.id));
      showToast(fromCache?`⚡ ${liveEvents.length} events loaded instantly`:`✓ ${liveEvents.length} live events loaded`);
    }else{
      setState({liveLoading:false,liveData:false});
    }
  }catch(e){
    console.log("Live fetch failed:",e.message);
    setState({liveLoading:false,liveData:false});
  }
}

async function loadAttendanceCounts(eventIds){
  const counts=await getAttendanceCounts(eventIds);

}

function detectLocation(){
  if(!navigator.geolocation){showToast("GPS not available");return;}
  setState({gpsLoading:true});
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    const r=latLngToRegion(lat,lng);
    state.userLat=lat;state.userLng=lng;
    setState({gpsLoading:false,searchInput:r.city});
    doSearch(r.city,r);
    showToast(`📍 Found you in ${r.city}`);
  },()=>{setState({gpsLoading:false});showToast("Couldn't get location");},{timeout:8000});
}

let leafletMap=null;

// Geocode cache
const geocodeCache = {};

async function geocodeAddress(address) {
  if(!address||address.length<5) return null;
  if(geocodeCache[address]) return geocodeCache[address];
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1&addressdetails=0`;
    const r = await fetch(url, {headers:{"User-Agent":"BuzzFinderApp/1.0 contact@buzzfinder.app"}});
    const d = await r.json();
    if(d&&d[0]){
      const result = {lat:parseFloat(d[0].lat), lng:parseFloat(d[0].lon)};
      geocodeCache[address] = result;
      return result;
    }
  } catch(e){}
  return null;
}

function addMapMarker(map, lat, lng, ev, bounds) {
  const meta = m2(ev.type);

    iconSize:[34,34],iconAnchor:[17,17],className:""
  });
  L.marker([lat,lng],{icon}).addTo(map).bindPopup(`
    <div style="background:#13131f;color:#fff;border-radius:12px;padding:14px;min-width:200px;max-width:240px;border:1px solid rgba(255,255,255,0.1)">
      <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
        <span style="background:${meta.color}22;color:${meta.color};padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700">${ev.type}</span>
        ${count?`<span style="font-size:10px;color:rgba(255,255,255,0.3)">👥 ${count} going</span>`:""}
      </div>
      <div style="font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:4px;line-height:1.3">${san(ev.name)}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:3px">${formatDate(ev.date)}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.25);margin-bottom:8px">${san(ev.location)}</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12px;font-weight:700;color:${meta.color}">${san(ev.cost)}</span>
        ${ev.url?`<a href="${ev.url}" target="_blank" style="color:#a5b4fc;font-size:11px;text-decoration:none">View →</a>`:""}
      </div>
    </div>
  `,{maxWidth:260});
  bounds.push([lat,lng]);
}

async function initMap(events, center){
  const mapDiv=document.getElementById("buzz-map");
  if(!mapDiv)return;
  
  if(leafletMap){leafletMap.remove();leafletMap=null;}
  
  const defaultCenter=center||[39.5,-98.35];
  leafletMap=L.map("buzz-map",{zoomControl:true,attributionControl:false}).setView(defaultCenter,10);
  
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
    attribution:"© OpenStreetMap © CartoDB",
    subdomains:"abcd",maxZoom:19
  }).addTo(leafletMap);

  const bounds=[];
  
  // Phase 1: Add events with existing coordinates immediately
  events.forEach(ev=>{
    const lat=parseFloat(ev.lat);
    const lng=parseFloat(ev.lng);
    if(!ev.lat||!ev.lng||isNaN(lat)||isNaN(lng)||lat===0||lng===0)return;
    if(lat<-90||lat>90||lng<-180||lng>180)return;
    addMapMarker(leafletMap,lat,lng,ev,bounds);
  });

  // Fit bounds with what we have so far
  if(bounds.length>0){
    leafletMap.fitBounds(bounds,{padding:[40,40],maxZoom:13});
  } else if(center){
    leafletMap.setView(center,11);
  }

  // Phase 2: Geocode events without coordinates
  const needsGeocode=events.filter(ev=>{
    const lat=parseFloat(ev.lat);
    const lng=parseFloat(ev.lng);
    return (!ev.lat||!ev.lng||isNaN(lat)||isNaN(lng)||lat===0||lng===0)&&(ev.address||ev.location);
  }).slice(0,15);

  for(const ev of needsGeocode){
    if(!leafletMap)break;
    const addr=ev.address||ev.location;
    if(!addr||addr.length<5||addr==="your area")continue;
    const coords=await geocodeAddress(addr);
    if(coords&&leafletMap){
      addMapMarker(leafletMap,coords.lat,coords.lng,ev,bounds);
      if(bounds.length<=3){
        leafletMap.fitBounds(bounds,{padding:[40,40],maxZoom:13});
      }
    }
    await new Promise(r=>setTimeout(r,1100));
  }

  if(bounds.length>0){
    leafletMap.fitBounds(bounds,{padding:[40,40],maxZoom:12});
  }
}

function updateAuthModal(){

  const errBox = document.getElementById("auth-error-box");

function bindModalEvents(overlay){
  // Close on X button
  document.getElementById("auth-close")?.addEventListener("click",()=>{
    overlay.remove();
    state.authModal=null;
    state.authError="";
    state.authLoading=false;
  });
  
  // Close on overlay click
  overlay.addEventListener("click",e=>{
    if(e.target===overlay){
      overlay.remove();
      state.authModal=null;
      state.authError="";
      state.authLoading=false;
    }
  });

  // Email input
  document.getElementById("auth-email")?.addEventListener("input",e=>{
    state.authEmail=e.target.value;
  });

  // Password input
  document.getElementById("auth-password")?.addEventListener("input",e=>{
    state.authPassword=e.target.value;
  });

  // Enter key on password
  document.getElementById("auth-password")?.addEventListener("keydown",e=>{
    if(e.key==="Enter") handleModalAuth(overlay);
  });

  // Submit button
  document.getElementById("auth-submit")?.addEventListener("click",()=>handleModalAuth(overlay));

  // Toggle mode
  document.getElementById("auth-toggle")?.addEventListener("click",()=>{
    state.authMode = state.authMode==="signup" ? "signin" : "signup";
    state.authError = "";
    const inner = document.getElementById("auth-modal-inner");
    if(inner) inner.outerHTML = getModalHTML();
    // Re-bind after content replacement
    const newOverlay = document.getElementById("auth-modal-overlay");
    if(newOverlay) bindModalEvents(newOverlay);
  });
}

async function handleModalAuth(overlay){
  if(state.authLoading) return;
  const emailEl = document.getElementById("auth-email");
  const passEl = document.getElementById("auth-password");
  const email = emailEl?.value?.trim() || state.authEmail;
  const password = passEl?.value || state.authPassword;

  if(!email||!password){
    state.authError = "Please enter your email and password";
    updateAuthModal();
    return;
  }
  if(password.length < 6){
    state.authError = "Password must be at least 6 characters";
    updateAuthModal();
    return;
  }

  state.authLoading = true;
  state.authError = "";
  updateAuthModal();

  try {
    const authFn = state.authMode==="signup" ? signUp : signIn;
    const result = await Promise.race([
      authFn(email, password),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error("Request timed out after 10 seconds")),10000))
    ]);

    console.log("Auth result:", JSON.stringify(result).slice(0,300));

    if(result.error||result.error_description||result.msg){
      state.authError = result.error_description||result.msg||result.error||"Authentication failed";
      state.authLoading = false;
      updateAuthModal();
      return;
    }

    const user = result.user || result.session?.user;
    const session = result.session || (result.access_token ? result : null);

    if(user){
      const going = await getUserGoing(user.id);
      state.session = session||result;
      state.user = user;
      state.authModal = null;
      state.authLoading = false;
      state.authEmail = "";
      state.authPassword = "";
      state.going = going;
      overlay.remove();
      showToast(state.authMode==="signup"?"✓ Account created! Welcome to Buzz":"✓ Welcome back!");
      render();
    } else if(state.authMode==="signup" && result.user===null && !result.error){
      // Email confirmation required
      state.authModal = null;
      state.authLoading = false;
      overlay.remove();
      showToast("✓ Check your email to confirm your account!");
      render();
    } else {
      state.authError = "Sign in failed. Check your email and password.";
      state.authLoading = false;
      updateAuthModal();
    }
  } catch(e){
    state.authError = e.message || "Connection failed. Try again.";
    state.authLoading = false;
    updateAuthModal();
  }
}

        <!-- View toggle -->
        <div style="display:flex;background:rgba(255,255,255,0.06);border-radius:10px;border:1px solid rgba(255,255,255,0.08);overflow:hidden;flex-shrink:0">
          <div id="list-view-btn" style="padding:6px 12px;font-size:12px;cursor:pointer;background:${state.viewMode==="list"?"rgba(99,102,241,0.3)":"transparent"};color:${state.viewMode==="list"?"#a5b4fc":"rgba(255,255,255,0.3)"}">≡ List</div>
          <div id="map-view-btn" style="padding:6px 12px;font-size:12px;cursor:pointer;background:${state.viewMode==="map"?"rgba(99,102,241,0.3)":"transparent"};color:${state.viewMode==="map"?"#a5b4fc":"rgba(255,255,255,0.3)"}">🗺 Map</div>
        </div>
        ${state.user
          ?`<div id="signout-btn" style="padding:6px 10px;border-radius:10px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.3);font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.07);flex-shrink:0">${state.user.email?.split("@")[0]||"Me"}</div>`
          :`<div id="signin-btn" style="padding:6px 10px;border-radius:10px;background:rgba(99,102,241,0.1);color:#a5b4fc;font-size:11px;cursor:pointer;border:1px solid rgba(99,102,241,0.2);flex-shrink:0">Sign in</div>`
        }
      </div>
      <div style="display:flex;gap:5px;max-width:700px;margin:0 auto;flex-wrap:wrap">
        <span style="padding:3px 9px;border-radius:6px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.35);font-size:11px;font-weight:500">${filtered.length} events</span>
        ${freeCount?`<span style="padding:3px 9px;border-radius:6px;background:rgba(16,185,129,0.07);color:#6ee7b7;font-size:11px;font-weight:500">${freeCount} free</span>`:""}
        ${weekendCount?`<span style="padding:3px 9px;border-radius:6px;background:rgba(99,102,241,0.07);color:#a5b4fc;font-size:11px;font-weight:500">${weekendCount} this weekend</span>`:""}
      </div>
    </div>

    ${state.viewMode==="map"?`
    <!-- Map view -->
    <div id="buzz-map" style="width:100%;height:calc(100vh - 120px)"></div>
    `:`
    <!-- List view -->
    <div style="max-width:700px;margin:0 auto;padding:12px 14px 80px">
      <div style="margin-bottom:12px">
        <div style="display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap">
          ${WHO_FILTERS.map(w=>`<div class="who-filter" data-who="${w.id}" style="padding:5px 12px;border-radius:999px;background:${state.whoFilter===w.id?"rgba(99,102,241,0.15)":"rgba(255,255,255,0.04)"};color:${state.whoFilter===w.id?"#a5b4fc":"rgba(255,255,255,0.3)"};font-size:11px;cursor:pointer;border:1px solid ${state.whoFilter===w.id?"rgba(99,102,241,0.3)":"rgba(255,255,255,0.05)"};display:flex;align-items:center;gap:4px">${w.icon} ${w.label}</div>`).join("")}
        </div>
        <div style="display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap">
          
        </div>
      </div>
      ${filtered.length===0?`<div style="text-align:center;padding:56px 0"><div style="font-size:32px;margin-bottom:12px;opacity:0.2">◯</div><p style="color:rgba(255,255,255,0.2);font-size:14px">Nothing found for your filters</p><div class="clear-all" style="display:inline-block;margin-top:12px;padding:8px 18px;border-radius:10px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.35);font-size:13px;cursor:pointer;border:1px solid rgba(255,255,255,0.06)">Clear filters</div></div>`:cards}
      <div style="margin-top:40px;padding:20px 0;border-top:1px solid rgba(255,255,255,0.05)">
        <div style="font-size:10px;color:rgba(255,255,255,0.15);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;text-align:center">Powered by</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
          <a href="https://developer.ticketmaster.com" target="_blank" style="display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;background:rgba(0,106,255,0.08);border:1px solid rgba(0,106,255,0.15);text-decoration:none"><span>🎫</span><span style="font-size:11px;font-weight:600;color:rgba(100,160,255,0.8)">Ticketmaster</span></a>
          <a href="https://serpapi.com" target="_blank" style="display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.15);text-decoration:none"><span>🔍</span><span style="font-size:11px;font-weight:600;color:rgba(52,211,153,0.8)">SerpAPI</span></a>
          <a href="https://rapidapi.com" target="_blank" style="display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.15);text-decoration:none"><span>⚡</span><span style="font-size:11px;font-weight:600;color:rgba(168,85,247,0.8)">RapidAPI</span></a>
          <a href="https://unsplash.com" target="_blank" style="display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);text-decoration:none"><span>📸</span><span style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.4)">Unsplash</span></a>
        </div>
        <div style="text-align:center;margin-top:12px;font-size:10px;color:rgba(255,255,255,0.1)">© 2026 Buzz · buzzfinder.app</div>
      </div>
    </div>`}
  </div>`;
}

function renderSuggestions(sugg){
  let c=document.getElementById("suggestions-container");
  if(!c)return;
  if(!sugg||!sugg.length){c.innerHTML="";return;}
  c.innerHTML=`<div style="background:rgba(15,15,20,0.98);border:1px solid rgba(255,255,255,0.07);border-radius:12px;margin-bottom:12px;overflow:hidden;animation:fadeIn 0.15s ease">${sugg.map(s=>`<div class="suggestion-item" data-city="${s.city}" data-state="${s.state}" data-zip="${s.zip}" data-region="${s.region||'DEFAULT'}" style="padding:11px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.04)"><span style="font-size:14px;color:#f1f5f9;font-weight:500">${s.city}, ${s.state}</span><span style="font-size:11px;color:rgba(255,255,255,0.2)">${s.zip}</span></div>`).join("")}</div>`;
  c.querySelectorAll(".suggestion-item").forEach(el=>{
    el.addEventListener("click",()=>{
      const r={city:el.dataset.city,state:el.dataset.state,zip:el.dataset.zip,region:el.dataset.region};
      state.searchInput=r.city+", "+r.state;state.suggestions=[];c.innerHTML="";
      doSearch(r.city,r);
    });
  });
}

function bindEvents(){
  const gps=document.getElementById("gps-btn");
  if(gps)gps.addEventListener("click",detectLocation);
  const signinBtn=document.getElementById("signin-btn");
  if(signinBtn)signinBtn.addEventListener("click",()=>setState({authModal:"signin",authMode:"signin",authError:""}));
  const signoutBtn=document.getElementById("signout-btn");
  if(signoutBtn)signoutBtn.addEventListener("click",signOut);
  const inp=document.getElementById("search-input");
  if(inp){
    inp.addEventListener("input",e=>{
      const v=e.target.value;state.searchInput=v;state.searchError="";
      const sugg=getSuggestions(v);state.suggestions=sugg;renderSuggestions(sugg);
    });
    inp.addEventListener("keydown",e=>{if(e.key==="Enter"){state.suggestions=[];renderSuggestions([]);doSearch(state.searchInput);}});
  }
  const go=document.getElementById("search-go");
  if(go)go.addEventListener("click",()=>{state.suggestions=[];renderSuggestions([]);doSearch(state.searchInput);});
  document.querySelectorAll(".who-btn").forEach(el=>el.addEventListener("click",()=>setState({whoFilter:el.dataset.who})));
  document.querySelectorAll(".range-btn").forEach(el=>el.addEventListener("click",()=>{state.dateRange=el.dataset.range;render();}));
  document.querySelectorAll(".quick-city").forEach(el=>el.addEventListener("click",()=>{state.searchInput=el.dataset.city;doSearch(el.dataset.city);}));
  const listBtn=document.getElementById("list-view-btn");
  const mapBtn=document.getElementById("map-view-btn");
  if(listBtn)listBtn.addEventListener("click",()=>{if(state.viewMode!=="list"){state.viewMode="list";render();}});
  if(mapBtn)mapBtn.addEventListener("click",()=>{
    if(state.viewMode!=="map"){
      state.viewMode="map";render();
      setTimeout(()=>{
        const maxDays=DATE_RANGES.find(d=>d.id===state.dateRange)?.days||90;
        const filtered=state.events.filter(ev=>withinDays(ev.date,maxDays));
        let center=null;
        if(state.userLat&&state.userLng)center=[state.userLat,state.userLng];
        else{
          const withCoords=filtered.filter(ev=>ev.lat&&ev.lng&&!isNaN(parseFloat(ev.lat))&&!isNaN(parseFloat(ev.lng)));
          if(withCoords.length>0)center=[parseFloat(withCoords[0].lat),parseFloat(withCoords[0].lng)];
          else {
            // Use city center lookup as fallback
            const cityData=Object.values(CITY_ZIP).find(c=>c.city===state.info?.city);
            if(cityData){
              // Use ZIP to estimate lat/lng - center of US as last resort
              center=[36.8529,-76.0]; // Default to VB area
            }
          }
        }
        initMap(filtered,center||[39.5,-98.35]); // async - geocodes addresses in background
      },150);
    }
  });
  const back=document.getElementById("back-btn");
  if(back)back.addEventListener("click",()=>setState({screen:"home",zip:"",events:[],info:null,openId:null,searchInput:"",suggestions:[],viewMode:"list"}));
  document.querySelectorAll(".card-row").forEach(el=>el.addEventListener("click",()=>{
    const id=el.dataset.id;const newId=state.openId===id?null:id;
    setState({openId:newId});
    if(newId&&!state.reviews[newId]){
      fetchReviews(newId).then(reviews=>{if(reviews.length>0){state.reviews={...state.reviews,[newId]:reviews};render();}});
    }
  }));
  document.querySelectorAll(".fav-btn").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const id=el.dataset.id;const f=new Set(state.favs);f.has(id)?f.delete(id):f.add(id);setState({favs:f});}));
  document.querySelectorAll(".going-btn").forEach(el=>el.addEventListener("click",()=>toggleAttendance(el.dataset.id,decodeURIComponent(el.dataset.name))));
  document.querySelectorAll(".type-filter").forEach(el=>el.addEventListener("click",()=>{state.typeFilter=el.dataset.type;render();}));
  document.querySelectorAll(".who-filter").forEach(el=>el.addEventListener("click",()=>{state.whoFilter=el.dataset.who;render();}));
  document.querySelectorAll(".range-filter").forEach(el=>el.addEventListener("click",()=>{state.dateRange=el.dataset.range;render();}));
  document.querySelectorAll(".toggle-free").forEach(el=>el.addEventListener("click",()=>{state.freeOnly=!state.freeOnly;render();}));
  document.querySelectorAll(".clear-all").forEach(el=>el.addEventListener("click",()=>{state.typeFilter="All";state.whoFilter="all";state.freeOnly=false;state.dateRange="3months";render();}));
  document.querySelectorAll(".cal-btn").forEach(el=>el.addEventListener("click",()=>{const d=(el.dataset.date||"").replace(/-/g,"");if(d)window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${el.dataset.name}&dates=${d}/${d}&location=${el.dataset.addr}`,"_blank");}));
  document.querySelectorAll(".share-btn").forEach(el=>el.addEventListener("click",()=>{
    const name=decodeURIComponent(el.dataset.name);
    const txt=`${name} — ${el.dataset.date} at ${decodeURIComponent(el.dataset.loc)}. ${el.dataset.cost==="Free"?"Free! ":""}Check it out on Buzz 🎉`;
    if(navigator.share)navigator.share({title:name,text:txt,url:el.dataset.url||"https://buzzfinder.app"});
    else{navigator.clipboard?.writeText(txt);showToast("📋 Copied!");}
  }));
  document.querySelectorAll(".star-btn").forEach(el=>el.addEventListener("click",()=>{
    const id=el.dataset.id;const star=parseInt(el.dataset.star);
    state.reviewInput={...state.reviewInput,[id]:{...(state.reviewInput[id]||{}),rating:star}};render();
  }));
  document.querySelectorAll(".review-text").forEach(el=>el.addEventListener("input",e=>{
    const id=el.dataset.id;
    state.reviewInput={...state.reviewInput,[id]:{...(state.reviewInput[id]||{}),comment:e.target.value}};
  }));
  document.querySelectorAll(".submit-review").forEach(el=>el.addEventListener("click",async()=>{
    const id=el.dataset.id;const name=el.dataset.name;const input=state.reviewInput[id]||{};
    if(!input.rating)return;
    state.reviewLoading={...state.reviewLoading,[id]:true};render();
    await submitReview(id,name,input.rating,input.comment||"");
    const newReview={event_id:id,event_name:name,rating:input.rating,comment:input.comment||"",created_at:new Date().toISOString()};
    state.reviews={...state.reviews,[id]:[newReview,...(state.reviews[id]||[])]};
    state.reviewInput={...state.reviewInput,[id]:{rating:0,comment:""}};
    state.reviewLoading={...state.reviewLoading,[id]:false};
    showToast("✓ Review submitted!");render();
  }));
}

render();
</script>
</body>
</html>
