// Open links in system browser (Capacitor + web compatible)
function openExternal(url){
  if(!url)return;
  if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Browser){
    window.Capacitor.Plugins.Browser.open({url:url});
  } else {
    window.open(url,'_blank','noopener,noreferrer');
  }
}

// ── Supabase Auth & DB ────────────────────────────────────────────────────────
async function sbFetch(path, options={}) {
  const headers = {
    "apikey": SUPABASE_KEY,
    "Content-Type": "application/json",
    ...options.headers
  };
  if (state.session?.access_token) {
    headers["Authorization"] = `Bearer ${state.session.access_token}`;
  } else {
    headers["Authorization"] = `Bearer ${SUPABASE_KEY}`;
  }
  return fetch(`${SUPABASE_URL}${path}`, { ...options, headers });
}

async function signUp(email, password) {
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: "POST",
      headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    return data;
  } catch(e) {
    return { error: e.message };
  }
}

async function signIn(email, password) {
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    return data;
  } catch(e) {
    return { error: e.message };
  }
}

async function signOut() {
  await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
    method: "POST",
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${state.session?.access_token}` }
  });
  setState({ session: null, user: null });
  try{ localStorage.removeItem("buzz_session"); localStorage.removeItem("buzz_user"); }catch(e){}
  showToast("Signed out");
}

async function getAttendance(eventId) {
  const r = await sbFetch(`/rest/v1/attendance?event_id=eq.${encodeURIComponent(eventId)}&select=count`);
  if (!r.ok) return 0;
  const d = await r.json();
  return d[0]?.count || 0;
}

async function getAttendanceCounts(eventIds) {
  if (!eventIds.length) return {};
  const ids = eventIds.map(id => `event_id.eq.${encodeURIComponent(id)}`).join(",");
  const r = await sbFetch(`/rest/v1/attendance?or=(${ids})`);
  if (!r.ok) return {};
  const d = await r.json();
  const counts = {};
  d.forEach(row => {
    counts[row.event_id] = (counts[row.event_id] || 0) + 1;
  });
  return counts;
}

async function toggleAttendance(eventId, eventName) {
  const userId = state.user?.id;
  if (!userId) {
    setState({ authModal: "signin", authRedirect: eventId });
    return;
  }
  const isGoing = state.going.has(eventId);
  if (isGoing) {
    await sbFetch(`/rest/v1/attendance?event_id=eq.${encodeURIComponent(eventId)}&user_id=eq.${userId}`, {
      method: "DELETE"
    });
    const newGoing = new Set(state.going);
    newGoing.delete(eventId);
    const newCounts = { ...state.attendanceCounts };
    newCounts[eventId] = Math.max(0, (newCounts[eventId] || 1) - 1);
    setState({ going: newGoing, attendanceCounts: newCounts });
    showToast("Removed from going");
  } else {
    await sbFetch(`/rest/v1/attendance`, {
      method: "POST",
      headers: { "Prefer": "return=minimal" },
      body: JSON.stringify({ event_id: eventId, event_name: eventName, user_id: userId })
    });
    const newGoing = new Set(state.going);
    newGoing.add(eventId);
    const newCounts = { ...state.attendanceCounts };
    newCounts[eventId] = (newCounts[eventId] || 0) + 1;
    setState({ going: newGoing, attendanceCounts: newCounts });
    showToast("✓ You're going!");
  }
}

async function getUserGoing(userId) {
  if (!userId) return new Set();
  const r = await sbFetch(`/rest/v1/attendance?user_id=eq.${userId}&select=event_id`);
  if (!r.ok) return new Set();
  const d = await r.json();
  return new Set(d.map(row => row.event_id));
}

async function submitReview(eventId, eventName, rating, comment) {
  const r = await sbFetch(`/rest/v1/reviews`, {
    method: "POST",
    headers: { "Prefer": "return=minimal" },
    body: JSON.stringify({ event_id: eventId, event_name: eventName, rating, comment, created_at: new Date().toISOString() })
  });
  return r.ok;
}

async function fetchReviews(eventId) {
  const r = await sbFetch(`/rest/v1/reviews?event_id=eq.${encodeURIComponent(eventId)}&order=created_at.desc&limit=5`);
  return r.ok ? await r.json() : [];
}

  if(match)return{...match,fromCity:true};
  const partial=Object.keys(CITY_ZIP).find(k=>k.startsWith(key));
  if(partial)return{...CITY_ZIP[partial],fromCity:true};
  return null;
}

// Cache-backed ZIP -> {lat,lng} geocoder (Zippopotam, free, works client-side).
// Cached in localStorage so each ZIP is only ever looked up once.
const _zipMem={};
async function geocodeZipCached(zip){
  if(!zip||zip.length!==5) return null;
  if(_zipMem[zip]!==undefined) return _zipMem[zip];
  try{
    const cached=localStorage.getItem("zipgeo:"+zip);
    if(cached){ const v=JSON.parse(cached); _zipMem[zip]=v; return v; }
  }catch(e){}
  try{
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),2500);
    const r=await fetch("https://api.zippopotam.us/us/"+zip,{signal:ctrl.signal});
    clearTimeout(t);
    if(r.ok){
      const d=await r.json();
      const p=d.places&&d.places[0];
      if(p){
        const v={lat:parseFloat(p.latitude),lng:parseFloat(p.longitude)};
        _zipMem[zip]=v;
        try{ localStorage.setItem("zipgeo:"+zip,JSON.stringify(v)); }catch(e){}
        return v;
      }
    }
  }catch(e){}
  _zipMem[zip]=null;
  try{ localStorage.setItem("zipgeo:"+zip,"null"); }catch(e){}
  return null;
}

// Best-effort: pull a usable 5-digit ZIP out of an event, using the address text
// first, then falling back to the city name via our CITY_ZIP table.
function eventZip(ev){
  const addr=ev.address||ev.location||"";
  const m=addr.match(/(\d{5})/);
  if(m) return m[1];
  const cs=addr.match(/([A-Za-z][A-Za-z\s]+),\s*([A-Z]{2})(?:\s|$)/);
  if(cs){
    const c=cs[1].trim().toLowerCase(), s=cs[2].toLowerCase();
    const e=CITY_ZIP[c+" "+s]||CITY_ZIP[c];
    if(e) return e.zip;
  }
  return null;
}

// Attach real lat/lng (from ZIP geocoding) to any events missing coordinates.
async function enrichCoords(events){
  try{
    const need=events.filter(ev=>!(ev.lat&&ev.lng)).map(ev=>({ev,zip:eventZip(ev)})).filter(x=>x.zip);
    const uniqueZips=[...new Set(need.map(x=>x.zip))].slice(0,40); // cap live lookups
    const coordsByZip={};
    // Overall time budget so results never wait on geocoding.
    const batch=Promise.all(uniqueZips.map(async z=>{ coordsByZip[z]=await geocodeZipCached(z); }));
    await Promise.race([batch, new Promise(res=>setTimeout(res,4000))]);
    need.forEach(({ev,zip})=>{
      const c=coordsByZip[zip];
      if(c){ ev.lat=c.lat; ev.lng=c.lng; }
    });
  }catch(e){ /* never let geocoding break the results */ }
  return events;
}

function haversine(lat1,lng1,lat2,lng2){
  const R=3959,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function formatDate(d){
  if(!d)return"TBD";
  try{
    const dt=new Date(d+"T00:00:00");
    const today=new Date();today.setHours(0,0,0,0);
    const diff=Math.round((dt-today)/(1000*60*60*24));
    if(diff===0)return"Today";
    if(diff===1)return"Tomorrow";
    if(diff<=6)return dt.toLocaleDateString("en-US",{weekday:"long"});
    return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  }catch{return d;}
}
function isThisWeekend(ds){
  if(!ds)return false;
  const t=new Date();t.setHours(0,0,0,0);
  const day=t.getDay();
  const fri=new Date(t);fri.setDate(t.getDate()+((5-day+7)%7));
  const sun=new Date(t);sun.setDate(t.getDate()+((7-day)%7||7));
  const ev=new Date(ds+"T00:00:00");
  return ev>=fri&&ev<=sun;
}
function withinDays(ds,days){
  if(!ds)return true;
  const today=new Date();today.setHours(0,0,0,0);
  const cutoff=new Date(today);cutoff.setDate(today.getDate()+days);
  const ev=new Date(ds+"T00:00:00");
  return ev>=today&&ev<=cutoff;
}

// "This Weekend" = today through the coming Sunday (inclusive)
function isThisWeekendOrSooner(ds){
  if(!ds) return false;
  const today=new Date(); today.setHours(0,0,0,0);
  const dow=today.getDay();               // 0=Sun ... 6=Sat
  const daysUntilSun = dow===0 ? 0 : (7-dow);
  const cutoff=new Date(today); cutoff.setDate(today.getDate()+daysUntilSun);
  const ev=new Date(ds+"T00:00:00");
  return ev>=today && ev<=cutoff;
}

async function fetchSubmittedEvents(city, zip) {
  try {
    const cityFilter = city && city !== "your area" 
      ? `city=ilike.${encodeURIComponent(city)}` 
      : `zip=eq.${zip}`;
    const today = new Date().toISOString().split("T")[0];
    const url = `${SUPABASE_URL}/rest/v1/submitted_events?${cityFilter}&start_date=gte.${today}&approved=eq.true&select=*&order=start_date.asc&limit=50`;
    const r = await fetch(url, {
      headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
    });
    if(!r.ok) return [];
    const events = await r.json();
    return events.map(ev=>({
      id:"sub_"+ev.id,
      name:ev.name,
      type:ev.event_type||"Community",
      startDate:ev.start_date,
      date:ev.start_date,
      location:ev.location||ev.city,
      address:ev.address?`${ev.address}, ${ev.city}, ${ev.state}`:`${ev.city}, ${ev.state||""}`,
      description:ev.description||"",
      cost:ev.cost||"Free",
      url:ev.url||"",
      source:"Local",
      who:["all"],
      familyRating:5,
    }));
  } catch(e){ return []; }
}

async function getCityCoords(city, state, zip) {
  try {
    // Use ZIP code first for accuracy - avoids ambiguous city names like "Franklin PA"
    // which has multiple matches in different parts of the state
    const zipQuery = zip && zip.length === 5 ? zip : null;
    const cityQuery = city && city !== "your area" ? `${city}${state?", "+state:""}` : null;
    
    // Try ZIP first, then fall back to city name
    const queries = zipQuery ? [zipQuery, cityQuery] : [cityQuery];
    
    for(const q of queries) {
      if(!q) continue;
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&addressdetails=0&countrycodes=us`;
      const r = await fetch(url, {headers:{"User-Agent":"BuzzFinderApp/1.0"}});
      const d = await r.json();
      if(d&&d[0]) return {lat:parseFloat(d[0].lat), lng:parseFloat(d[0].lon)};
    }
  } catch(e){}
  return null;
}

async function doSearch(input,regionOverride){
  const resolved=regionOverride||resolveSearch(input);
  if(!resolved){setState({searchError:`Couldn't find "${input}". Try a city name or ZIP.`});return;}
  const zip=resolved.zip;
  const info=resolved.city?resolved:getRegionInfo(zip);
  // Reset filters ONCE at the start of a new search (not on later re-renders,
  // which would silently undo the user's filter choices while results load).
 
  state.eventSearch="";

  // If this search came from GPS (regionOverride), keep the user's REAL coordinates.
  // Only geocode the city when we don't already have a precise position.
  setState({coordsLoading:true,screen:"results",info,zip,events:[],searchError:""});
  const fromGPS = !!(regionOverride && regionOverride.fromGPS);
  if(!(fromGPS && state.userLat && state.userLng)){
    const coords = await getCityCoords(info.city,info.state,zip);
    if(coords){state.userLat=coords.lat;state.userLng=coords.lng;}
  }
  setState({coordsLoading:false});

  setState({loading:false,liveLoading:true,screen:"results",events:[],openId:null,liveData:false,liveLoading:true,info,zip,searchError:"",attendanceCounts:{},viewMode:"list"});
  
  
  // Phase 2 - live events
  try{
    const coordParams=state.userLat&&state.userLng?`&lat=${state.userLat}&lng=${state.userLng}`:"";
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 20000);
    const [res, submittedEventsResult] = await Promise.all([
      fetch(`${PROXY_URL}?zip=${zip}${coordParams}&city=${encodeURIComponent(info?.city||"")}&state=${encodeURIComponent(info?.state||"")}`, {signal:controller.signal}),
      fetchSubmittedEvents(info?.city, zip).catch(()=>[])
    ]);
    const submittedEvents = submittedEventsResult || [];
    clearTimeout(timeout);
    if(!res.ok)throw new Error("API error");
    const data=await res.json();
if(data.events&&data.events.length>0){
      const liveEvents=data.events.map(ev=>({
        ...ev,emoji:m2(ev.type).icon,photo:ev.image||getPhoto(ev.type,ev.id),
        weather:getWeather(ev.startDate,getRegionInfo(zip).region),
        isWeekend:isThisWeekend(ev.startDate),date:ev.startDate,
        sched:ev.subEvents?.map(s=>`${s.time} · ${s.name}`)||[],
        rating:ev.familyRating||4,who:["all"],
      }));

      // Give every event real coordinates where we can (geocode its ZIP, cached),
      // then filter purely by true distance. No more ZIP-prefix guessing.
      try{ await enrichCoords(liveEvents); }catch(e){}

      const MAX_DIST = 50; // miles
      const haveSearchCoords = !!(state.userLat && state.userLng);
      const stateAbbr=(state.info?.state||"").toUpperCase();
      const ALWAYS_KEEP=["Submitted","Local","USDA"]; // user-added / local sources

      window.__loc={raw:liveEvents.length,kept:0,lat:state.userLat,lng:state.userLng,city:info?.city||"",dropped:[]};
      const filteredLive = liveEvents.filter(ev=>{
        // Trusted local/user sources always show
        if(ALWAYS_KEEP.includes(ev.source)) return true;

        const evLat=ev.lat?parseFloat(ev.lat):null;
        const evLng=ev.lng?parseFloat(ev.lng):null;

        // Real coordinates -> real distance
        if(evLat&&evLng&&haveSearchCoords){
          return haversine(state.userLat,state.userLng,evLat,evLng)<=MAX_DIST;
        }

        // Ticketmaster provides its own distance
        if(ev.distanceMiles!=null) return ev.distanceMiles<=MAX_DIST;

        // Couldn't place it. If we know the search location, drop the unplaceable
        // event only when its address clearly names a different state; otherwise keep.
        const addr=ev.address||ev.location||"";
        const cs=addr.match(/,\s*([A-Z]{2})(?:\s|$)/);
        if(cs && stateAbbr && cs[1].toUpperCase()!==stateAbbr) return false;
        return true;
      });
      window.__loc.kept=filteredLive.length;
      window.__loc.dropped=liveEvents.filter(e=>!filteredLive.includes(e)).slice(0,3).map(e=>(e.address||e.location||"?").slice(0,28));

const merged=[...submittedEvents,...filteredLive];
      merged.sort((a,b)=>{
        const distA=(state.userLat&&state.userLng&&a.lat&&a.lng)
          ?haversine(state.userLat,state.userLng,parseFloat(a.lat),parseFloat(a.lng))
          :(a.distanceMiles!=null?a.distanceMiles:null);
        const distB=(state.userLat&&state.userLng&&b.lat&&b.lng)
          ?haversine(state.userLat,state.userLng,parseFloat(b.lat),parseFloat(b.lng))
          :(b.distanceMiles!=null?b.distanceMiles:null);
        if(distA!=null&&distB==null) return -1;
        if(distA==null&&distB!=null) return 1;
        if(distA!=null&&distB!=null){
          const band=(d)=>d<5?0:d<15?1:d<30?2:d<60?3:4;
          if(band(distA)!==band(distB)) return band(distA)-band(distB);
        }
        if(!a.date&&!b.date) return 0;
        if(!a.date) return 1;
        if(!b.date) return -1;
        return a.date.localeCompare(b.date);
      });
      // Trim repeated listings (e.g. 20 of the same recurring game/series) but
      // keep different events that happen to share a venue. We cap by a
      // name+venue signature, not by venue alone, so small-town venues that
      // host many DIFFERENT events aren't gutted.
      const seenCounts={};
      const deduped=merged.filter(ev=>{
        // Normalize the event name: drop trailing "vs. X" / dates so a home
        // team's many games collapse toward one signature.
        const baseName=(ev.name||"")
          .toLowerCase()
          .replace(/\s+(vs\.?|versus|v\.)\s+.*/,"")   // "Erie Otters vs. X" -> "erie otters"
          .replace(/[0-9]/g,"")
          .trim()
          .slice(0,24);
        const venue=(ev.location||"").toLowerCase().slice(0,20);
        const sig=baseName+"|"+venue;
        seenCounts[sig]=(seenCounts[sig]||0)+1;
        // Allow up to 3 of the same repeated series/name at the same venue.
        return seenCounts[sig]<=3;
      });

      const fromCache=data.fromCache===true;
      setTimeout(()=>{
        setState({events:deduped,loading:false,liveLoading:false,liveData:true,fromCache});
      }, 400);
      loadAttendanceCounts(merged.map(e=>e.id));
      showToast(fromCache?`⚡ ${liveEvents.length} events loaded instantly`:`✓ ${liveEvents.length} live events loaded`);
    }else{
      setState({events:submittedEvents||[],loading:false,liveLoading:false,liveData:false});
    }
  }catch(e){
    console.log("Live fetch failed:",e.message,e);
    showToast("Could not load events: "+e.message);
    setState({loading:false,liveLoading:false,liveData:false});
  }
}

function detectLocation(){
  if(!navigator.geolocation){showToast("GPS not available");return;}
  setState({gpsLoading:true});
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    state.userLat=lat;state.userLng=lng;
    // Reverse-geocode the real coordinates instead of guessing from a hardcoded list
    let place=await reverseGeocode(lat,lng);
    if(!place){
      // Fallback to the old bounding-box guess only if reverse geocoding fails
      place=latLngToRegion(lat,lng);
    }
    // Guarantee a valid 5-digit ZIP; borrow one from CITY_ZIP if reverse geocoding
    // didn't return a postcode, so the API never rejects the request.
    if(!place.zip || String(place.zip).length!==5){
      const key=(place.city||"").toLowerCase()+" "+(place.state||"").toLowerCase();
      const e=CITY_ZIP[key]||CITY_ZIP[(place.city||"").toLowerCase()];
      place.zip = e?e.zip : (latLngToRegion(lat,lng).zip||"");
    }
    // Reverse geocoding often returns a COUNTY (e.g. "Dinwiddie") which Google
    // doesn't index as an events location. Snap to the nearest known city so the
    // API searches a real place, while we keep the user's true coordinates.
    const nearest=nearestKnownCity(lat,lng);
    if(nearest && nearest.miles<=35){
      const looksLikeCounty=!CITY_ZIP[(place.city||"").toLowerCase()];
      if(looksLikeCounty){
        place.city=nearest.city;
        place.state=nearest.state;
        place.zip=nearest.zip;
        place.region=nearest.region||place.region;
      }
    }
    place.fromGPS=true;
    setState({gpsLoading:false,searchInput:place.city});
    doSearch(place.city,place);
    showToast(`📍 Found you in ${place.city}${place.state?", "+place.state:""}`);
  },()=>{setState({gpsLoading:false});showToast("Couldn't get location");},{timeout:8000,enableHighAccuracy:true});
}

// Turn GPS coordinates into a real {city,state,zip,region} using Nominatim reverse geocoding
// A compact lat/lng table for cities we know, used to snap county-level GPS
// results onto a real, searchable city. Only needs rough accuracy.
const CITY_COORDS={
  "petersburg va":[37.2279,-77.4019],
  "colonial heights va":[37.2440,-77.4105],
  "hopewell va":[37.3043,-77.2872],
  "chester va":[37.3549,-77.4416],
  "richmond":[37.5407,-77.4360],
  "virginia beach":[36.8529,-75.9780],
  "norfolk va":[36.8508,-76.2859],
  "chesapeake va":[36.7682,-76.2875],
  "moyock nc":[36.5240,-76.1738],
  "elizabeth city nc":[36.2946,-76.2510],
  "titusville pa":[41.6265,-79.6803],
  "oil city pa":[41.4342,-79.7062],
  "franklin pa":[41.3976,-79.8314],
  "meadville pa":[41.6414,-80.1514],
  "erie pa":[42.1292,-80.0851]
};

function nearestKnownCity(lat,lng){
  let best=null;
  for(const [key,[clat,clng]] of Object.entries(CITY_COORDS)){
    const e=CITY_ZIP[key];
    if(!e) continue;
    const miles=haversine(lat,lng,clat,clng);
    if(!best||miles<best.miles) best={city:e.city,state:e.state,zip:e.zip,region:e.region,miles};
  }
  return best;
}

async function reverseGeocode(lat,lng){
  // Primary: BigDataCloud — keyless, CORS-friendly, reliable for rural coords
  try{
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),6000);
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=en`,{signal:ctrl.signal});
    clearTimeout(t);
    if(r.ok){
      const d=await r.json();
      if((d.countryCode==="US")||(!d.countryCode)){
        // In rural areas `city` can be blank; fall back to locality / county name
        const county=(d.localityInfo&&d.localityInfo.administrative||[]).slice().reverse().find(a=>a.name&&/county|city|town/i.test(a.description||""));
        const city=d.city||d.locality||(county&&county.name)||"";
        const stateName=d.principalSubdivision||"";
        const zip=d.postcode?String(d.postcode).slice(0,5):"";
        if(city){
          return {
            city,
            state: US_STATE_ABBR[stateName]||stateName||"",
            zip,
            region: US_STATE_ABBR[stateName]||"DEFAULT"
          };
        }
      }
    }
  }catch(e){}

  // Fallback: Nominatim
  try{
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),5000);
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=12&addressdetails=1`,{headers:{"Accept":"application/json"},signal:ctrl.signal});
    clearTimeout(t);
    if(r.ok){
      const d=await r.json();
      const a=d.address||{};
      const city=a.city||a.town||a.village||a.hamlet||a.municipality||a.county||"";
      const state=a.state||"";
      const zip=a.postcode?String(a.postcode).slice(0,5):"";
      if(city){
        return {
          city,
          state: US_STATE_ABBR[state]||state||"",
          zip,
          region: US_STATE_ABBR[state]||"DEFAULT"
        };
      }
    }
  }catch(e){}

  return null;
}

// Geocode cache
const geocodeCache = {};

async function geocodeAddress(address) {
  if(!address||address.length<5) return null;
  if(geocodeCache[address]) return geocodeCache[address];
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1&addressdetails=0`;
    const r = await fetch(url, {headers:{"User-Agent":"BuzzFinderApp/1.0 contact@buzzfinder.app"}});
    const d = await r.json();
    if(d&&d[0]){
      const result = {lat:parseFloat(d[0].lat), lng:parseFloat(d[0].lon)};
      geocodeCache[address] = result;
      return result;
    }
  } catch(e){}
  return null;
}

  const defaultCenter=center||[39.5,-98.35];
  leafletMap=L.map("buzz-map",{zoomControl:true,attributionControl:false}).setView(defaultCenter,10);
  
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
    attribution:"© OpenStreetMap © CartoDB",
    subdomains:"abcd",maxZoom:19
  }).addTo(leafletMap);

  const bounds=[];
  
  // Phase 1: Add events with existing coordinates immediately
  events.forEach(ev=>{
    const lat=parseFloat(ev.lat);
    const lng=parseFloat(ev.lng);
    if(!ev.lat||!ev.lng||isNaN(lat)||isNaN(lng)||lat===0||lng===0)return;
    if(lat<-90||lat>90||lng<-180||lng>180)return;
    addMapMarker(leafletMap,lat,lng,ev,bounds);
  });

  // Fit bounds with what we have so far
  if(bounds.length>0){
    leafletMap.fitBounds(bounds,{padding:[40,40],maxZoom:13});
  } else if(center){
    leafletMap.setView(center,11);
  }

  // Phase 2: Geocode events without coordinates
  const needsGeocode=events.filter(ev=>{
    const lat=parseFloat(ev.lat);
    const lng=parseFloat(ev.lng);
    return (!ev.lat||!ev.lng||isNaN(lat)||isNaN(lng)||lat===0||lng===0)&&(ev.address||ev.location);
  }).slice(0,15);

  for(const ev of needsGeocode){
    if(!leafletMap)break;
    const addr=ev.address||ev.location;
    if(!addr||addr.length<5||addr==="your area")continue;
    const coords=await geocodeAddress(addr);
    if(coords&&leafletMap){
      addMapMarker(leafletMap,coords.lat,coords.lng,ev,bounds);
      if(bounds.length<=3){
        leafletMap.fitBounds(bounds,{padding:[40,40],maxZoom:13});
      }
    }
    await new Promise(r=>setTimeout(r,1100));
  }

  if(bounds.length>0){
    leafletMap.fitBounds(bounds,{padding:[40,40],maxZoom:12});
  }
}


async function restoreSession(){
  try{
    const savedSession = localStorage.getItem("buzz_session");
    const savedUser = localStorage.getItem("buzz_user");
    if(savedSession && savedUser){
      const session = JSON.parse(savedSession);
      const user = JSON.parse(savedUser);
      // Verify session is still valid by checking expiry
      if(session.expires_at){
        const expiresAt = new Date(session.expires_at * 1000);
        if(expiresAt > new Date()){
          state.session = session;
          state.user = user;
          const going = await getUserGoing(user.id);
          state.going = going;
          render();
          return;
        }
      }
      // Session expired - try to refresh
      if(session.refresh_token){
        try{
          const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,{
            method:"POST",
            headers:{"apikey":SUPABASE_KEY,"Content-Type":"application/json"},
            body:JSON.stringify({refresh_token:session.refresh_token})
          });
          const data = await r.json();
          if(data.access_token){
            state.session = data;
            state.user = data.user||user;
            localStorage.setItem("buzz_session", JSON.stringify(state.session));
            localStorage.setItem("buzz_user", JSON.stringify(state.user));
            const going = await getUserGoing(state.user.id);
            state.going = going;
            render();
            return;
          }
        }catch(e){}
      }
      // Clear invalid session
      localStorage.removeItem("buzz_session");
      localStorage.removeItem("buzz_user");
    }
  }catch(e){}
}

  document.getElementById("root").innerHTML=state.legalScreen?renderLegal():state.screen==="home"?renderHome():renderResults();

  const existingModal = document.getElementById("auth-modal-overlay");
  if(state.authModal && !existingModal){
    renderAuthModal();
  } else if(!state.authModal && existingModal){
    existingModal.remove();
  } else if(state.authModal && existingModal){
    // Update modal content without recreating it
    updateAuthModal();
  }
}

function updateAuthModal(){
  // Update error, loading state, and subtitle without recreating
  const errBox = document.getElementById("auth-error-box");
  const submitBtn = document.getElementById("auth-submit");
  const subtitle = document.getElementById("auth-subtitle");
  if(errBox){
    errBox.style.display = state.authError ? "block" : "none";
    errBox.textContent = state.authError || "";
  }
  if(submitBtn){
    submitBtn.textContent = state.authLoading ? "Loading..." : (state.authMode==="signup"?"Create Account":"Sign In");
    submitBtn.style.opacity = state.authLoading ? "0.7" : "1";
  }
  if(subtitle){
    subtitle.textContent = state.authMode==="signup" ? "Create your account" : "Welcome back";
  }
}

function bindModalEvents(overlay){
  // Close on X button
  document.getElementById("auth-close")?.addEventListener("click",()=>{
    overlay.remove();
    state.authModal=null;
    state.authError="";
    state.authLoading=false;
  });
  
  // Close on overlay click
  overlay.addEventListener("click",e=>{
    if(e.target===overlay){
      overlay.remove();
      state.authModal=null;
      state.authError="";
      state.authLoading=false;
    }
  });

  // Email input
  document.getElementById("auth-email")?.addEventListener("input",e=>{
    state.authEmail=e.target.value;
  });

  // Password input
  document.getElementById("auth-password")?.addEventListener("input",e=>{
    state.authPassword=e.target.value;
  });

  // Enter key on password
  document.getElementById("auth-password")?.addEventListener("keydown",e=>{
    if(e.key==="Enter") handleModalAuth(overlay);
  });

  // Submit button
  document.getElementById("auth-submit")?.addEventListener("click",()=>handleModalAuth(overlay));

  // Toggle mode
  document.getElementById("auth-toggle")?.addEventListener("click",()=>{
    state.authMode = state.authMode==="signup" ? "signin" : "signup";
    state.authError = "";
    const inner = document.getElementById("auth-modal-inner");
    if(inner) inner.outerHTML = getModalHTML();
    // Re-bind after content replacement
    const newOverlay = document.getElementById("auth-modal-overlay");
    if(newOverlay) bindModalEvents(newOverlay);
  });
}

async function handleModalAuth(overlay){
  if(state.authLoading) return;
  const emailEl = document.getElementById("auth-email");
  const passEl = document.getElementById("auth-password");
  const email = emailEl?.value?.trim() || state.authEmail;
  const password = passEl?.value || state.authPassword;

  if(!email||!password){
    state.authError = "Please enter your email and password";
    updateAuthModal();
    return;
  }
  if(password.length < 6){
    state.authError = "Password must be at least 6 characters";
    updateAuthModal();
    return;
  }

  state.authLoading = true;
  state.authError = "";
  updateAuthModal();

  try {
    const authFn = state.authMode==="signup" ? signUp : signIn;
    const result = await Promise.race([
      authFn(email, password),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error("Request timed out after 10 seconds")),10000))
    ]);

    console.log("Auth result:", JSON.stringify(result).slice(0,300));

    if(result.error||result.error_description||result.msg){
      state.authError = result.error_description||result.msg||result.error||"Authentication failed";
      state.authLoading = false;
      updateAuthModal();
      return;
    }

    const user = result.user || result.session?.user;
    const session = result.session || (result.access_token ? result : null);

    if(user){
      const going = await getUserGoing(user.id);
      state.session = session||result;
      state.user = user;
      state.authModal = null;
      state.authLoading = false;
      state.authEmail = "";
      state.authPassword = "";
      state.going = going;
      // Save session to localStorage if "Keep me signed in" is checked
      const keepSignedIn = document.getElementById("keep-signed-in")?.checked !== false;
      if(keepSignedIn){
        try{ localStorage.setItem("buzz_session", JSON.stringify(state.session)); }catch(e){}
        try{ localStorage.setItem("buzz_user", JSON.stringify(state.user)); }catch(e){}
      }
      overlay.remove();
      showToast(state.authMode==="signup"?"✓ Account created! Welcome to Buzz":"✓ Welcome back!");
      render();
    } else if(state.authMode==="signup" && result.user===null && !result.error){
      // Email confirmation required
      state.authModal = null;
      state.authLoading = false;
      overlay.remove();
      showToast("✓ Check your email to confirm your account!");
      render();
    } else {
      state.authError = "Sign in failed. Check your email and password.";
      state.authLoading = false;
      updateAuthModal();
    }
  } catch(e){
    state.authError = e.message || "Connection failed. Try again.";
    state.authLoading = false;
    updateAuthModal();
  }
}

function renderResults(){
  window.__dbg={checked:0,kept:0,samples:[]};
  const maxDays=DATE_RANGES.find(d=>d.id===state.dateRange)?.days||90;
const filtered=state.events.filter(ev=>{
    if(state.typeFilter!=="All"&&ev.type!==state.typeFilter)return false;
    if(state.freeOnly&&ev.cost!=="Free")return false;
    // Respect the "how far out" range. Use the same date field the grouping uses.
    const evDate=ev.date||ev.startDate;
    if(state.dateRange==="weekend"){
      const ok=isThisWeekendOrSooner(evDate);
      window.__dbg=window.__dbg||{checked:0,kept:0,samples:[]};
      window.__dbg.checked++;
      if(ok) window.__dbg.kept++;
      else if(window.__dbg.samples.length<3) window.__dbg.samples.push(String(evDate));
      if(!ok) return false;
    } else if(!withinDays(evDate,maxDays)){
      return false;
    }
    // Text search across name / venue / address / description / type
    if(state.eventSearch){
      const q=state.eventSearch;
      const hay=((ev.name||"")+" "+(ev.location||"")+" "+(ev.address||"")+" "+(ev.description||"")+" "+(ev.type||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>{
    // 1) Chronological date group first so sections always read
    //    Today -> Tomorrow -> This Weekend -> Next Week -> This Month -> Later
    const GROUP_RANK={"Today":0,"Tomorrow":1,"This Weekend":2,"Next Week":3,"This Month":4,"Later":5};
    const rankA=GROUP_RANK[getEvGroup(a.date)] ?? 5;
    const rankB=GROUP_RANK[getEvGroup(b.date)] ?? 5;
    if(rankA!==rankB) return rankA-rankB;

    // 2) Within the same group, closest events first
    const distA = (state.userLat&&state.userLng&&a.lat&&a.lng)
      ? haversine(state.userLat,state.userLng,parseFloat(a.lat),parseFloat(a.lng))
      : (a.distanceMiles!=null?a.distanceMiles:null);
    const distB = (state.userLat&&state.userLng&&b.lat&&b.lng)
      ? haversine(state.userLat,state.userLng,parseFloat(b.lat),parseFloat(b.lng))
      : (b.distanceMiles!=null?b.distanceMiles:null);
    if(distA!=null&&distB==null) return -1;
    if(distA==null&&distB!=null) return 1;
    if(distA!=null&&distB!=null){
      const band=(d)=>d<5?0:d<15?1:d<30?2:d<60?3:4;
      if(band(distA)!==band(distB)) return band(distA)-band(distB);
    }

    // 3) Then by actual date within the group
    if(!a.date&&!b.date)return 0;
    if(!a.date)return 1;
    if(!b.date)return -1;
    return a.date.localeCompare(b.date);
  });
  const types=["All",...new Set(state.events.map(e=>e.type))];
  const freeCount=filtered.filter(e=>e.cost==="Free").length;

  const selectedRange=DATE_RANGES.find(d=>d.id===state.dateRange);

  if(state.loading||state.coordsLoading||state.liveLoading){

      </div>
    </div>`;
  }

  // Group events by date section
  function getDateGroup(dateStr){
    if(!dateStr) return "Later";
    const today=new Date(); today.setHours(0,0,0,0);
    const evDate=new Date(dateStr+"T00:00:00");
    const diff=Math.floor((evDate-today)/(1000*60*60*24));
    if(diff<0) return null; // past event, skip
    if(diff===0) return "Today";
    if(diff===1) return "Tomorrow";
    const dayOfWeek=today.getDay(); // 0=Sun
    const daysUntilSunday=7-dayOfWeek;
    if(diff<=daysUntilSunday) return "This Weekend";
    if(diff<=14) return "Next Week";
    if(diff<=30) return "This Month";
    return "Later";
  }

  // Build grouped cards
  const GROUP_ORDER=["Today","Tomorrow","This Weekend","Next Week","This Month","Later"];
  const groups={};
  filtered.forEach(ev=>{
    const g=getDateGroup(ev.date||ev.startDate);
    if(!g) return;
    if(!groups[g]) groups[g]=[];
    groups[g].push(ev);
  });

  // Date group helper
  function getEvGroup(d){
    if(!d) return "Later";
    const today=new Date(); today.setHours(0,0,0,0);
    const evDate=new Date(d+"T00:00:00");
    const diff=Math.floor((evDate-today)/86400000);
    if(diff<0) return "Later";
    if(diff===0) return "Today";
    if(diff===1) return "Tomorrow";
    // This Weekend = the coming Saturday and Sunday only
    const dow=evDate.getDay(); // 0=Sun, 6=Sat
    const todayDow=today.getDay();
    const daysUntilSat=todayDow<=6?(6-todayDow):0;
    const daysUntilSun=todayDow===0?0:(7-todayDow);
    const isThisWeekend=(diff>1)&&(diff<=daysUntilSun+1)&&(dow===0||dow===6);
    if(isThisWeekend) return "This Weekend";
    // Next Week = Mon-Sun of next calendar week
    const daysUntilNextMon=todayDow===0?1:(8-todayDow);
    const daysUntilNextSun=daysUntilNextMon+6;
    if(diff>=daysUntilNextMon&&diff<=daysUntilNextSun) return "Next Week";
    if(diff<=31) return "This Month";
    return "Later";
  }

function renderSuggestions(sugg){
  let c=document.getElementById("suggestions-container");
  if(!c)return;
  if(!sugg||!sugg.length){c.innerHTML="";return;}
  c.innerHTML=`<div style="background:rgba(15,15,20,0.98);border:1px solid rgba(255,255,255,0.07);border-radius:12px;margin-bottom:12px;overflow:hidden;animation:fadeIn 0.15s ease">${sugg.map(s=>`<div class="suggestion-item" data-city="${s.city}" data-state="${s.state}" data-zip="${s.zip}" data-region="${s.region||'DEFAULT'}" style="padding:11px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.04)"><span style="font-size:14px;color:#f1f5f9;font-weight:500">${s.city}, ${s.state}</span><span style="font-size:11px;color:rgba(255,255,255,0.75)">${s.zip}</span></div>`).join("")}</div>`;
  c.querySelectorAll(".suggestion-item").forEach(el=>{
    el.addEventListener("click",()=>{
      const r={city:el.dataset.city,state:el.dataset.state,zip:el.dataset.zip,region:el.dataset.region};
      state.searchInput=r.city+", "+r.state;state.suggestions=[];c.innerHTML="";
      doSearch(r.city,r);
    });
  });
}

            <option value="Paid">Paid</option>
            <option value="See site">See website for details</option>
          </select>
        </div>

          <label style="color:rgba(255,255,255,0.75);font-size:11px;text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:6px">Description</label>
          <textarea id="sf-desc" placeholder="Tell people what this event is about..." style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#f1f5f9;padding:10px 12px;font-size:14px;box-sizing:border-box;min-height:80px;resize:none"></textarea>
        </div>
        <div>
          <label style="color:rgba(255,255,255,0.75);font-size:11px;text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:6px">Website / Ticket Link</label>
          <input id="sf-url" placeholder="https://..." style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#f1f5f9;padding:10px 12px;font-size:14px;box-sizing:border-box">
        </div>
        <button id="sf-submit" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;padding:14px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;margin-top:4px">Submit Event</button>
        <p style="color:rgba(255,255,255,0.75);font-size:11px;text-align:center">Events appear immediately in search results</p>
      </div>
    </div>`;
  
  document.body.appendChild(overlay);
  
  // Close handlers
  overlay.addEventListener("click",(e)=>{if(e.target===overlay)overlay.remove();});
  document.getElementById("close-submit").addEventListener("click",()=>overlay.remove());
  
  // Submit handler
  document.getElementById("sf-submit").addEventListener("click",async()=>{
    const name=document.getElementById("sf-name").value.trim();
    const date=document.getElementById("sf-date").value;
    const city=document.getElementById("sf-city").value.trim();
    if(!name||!date||!city){showToast("Please fill in name, date and city");return;}
    
    const btn=document.getElementById("sf-submit");
    btn.textContent="Submitting...";
    btn.disabled=true;
    
    try{
      const payload={
        name,
        event_type:document.getElementById("sf-type").value||"Community",
        start_date:date,
        start_time:document.getElementById("sf-time").value||null,
        location:document.getElementById("sf-location").value||null,
        address:document.getElementById("sf-address").value||null,
        city,
        state:document.getElementById("sf-state").value.toUpperCase()||null,
        zip:state.zip||null,
        description:document.getElementById("sf-desc").value||null,
        url:document.getElementById("sf-url").value||null,
        cost:document.getElementById("sf-cost").value||"Free",
        approved:true,
      };
      const r=await fetch(`${SUPABASE_URL}/rest/v1/submitted_events`,{
        method:"POST",
        headers:{
          "apikey":SUPABASE_KEY,
          "Authorization":`Bearer ${SUPABASE_KEY}`,
          "Content-Type":"application/json",
          "Prefer":"return=minimal"
        },
        body:JSON.stringify(payload)
      });
      if(!r.ok)throw new Error("Failed: "+r.status);
      
      // Add event to state immediately so it shows without re-searching
      const newEvent = {
        id: "sub_"+Date.now(),
        name: payload.name,
        type: payload.event_type||"Community",
        startDate: payload.start_date,
        date: payload.start_date,
        location: payload.location||city,
        address: payload.address ? `${payload.address}, ${city}, ${payload.state||""}` : `${city}, ${payload.state||""}`,
        description: payload.description||"",
        cost: payload.cost||"Free",
        url: payload.url||"",
        source: "Submitted",
        who: ["all"],
        familyRating: 5,
        emoji: "📌",
      };
      setState({events:[newEvent,...state.events]});

      overlay.querySelector("div").innerHTML=`
        <div style="text-align:center;padding:60px 20px">
          <div style="font-size:56px;margin-bottom:16px">🎉</div>
          <p style="color:#f1f5f9;font-size:18px;font-weight:700;margin-bottom:8px">Event Added!</p>
          <p style="color:rgba(255,255,255,0.75);font-size:14px;margin-bottom:24px">Your event is now showing in Buzz for ${city}. Thanks for helping your community!</p>
          <button onclick="document.getElementById('submit-overlay').remove()" style="background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;padding:12px 28px;border-radius:12px;cursor:pointer;font-size:14px">Done</button>
        </div>`;
    }catch(e){
      showToast("Something went wrong. Please try again.");
      btn.textContent="Submit Event";
      btn.disabled=false;
    }
  });
}

function bindSubmitEvents(){
  const closeSubmit=document.getElementById("close-submit");
  if(closeSubmit)closeSubmit.addEventListener("click",()=>{
    state.submitScreen=false;
    document.getElementById("submit-overlay")?.remove();
  });

  const overlay=document.getElementById("submit-overlay");
  if(overlay)overlay.addEventListener("click",(e)=>{
    if(e.target===overlay){
      state.submitScreen=false;
      overlay.remove();
    }
  });

  const submitAnother=document.getElementById("submit-another");
  if(submitAnother)submitAnother.addEventListener("click",()=>setState({submitSuccess:false,submitForm:{name:"",type:"Community",date:"",time:"",location:"",address:"",city:state.info?.city||"",state:state.info?.state||"",description:"",cost:"Free",url:""}}));

  const sfSubmit=document.getElementById("sf-submit");
  if(sfSubmit)sfSubmit.addEventListener("click",async()=>{
    const name=document.getElementById("sf-name")?.value.trim();
    const date=document.getElementById("sf-date")?.value;
    const city=document.getElementById("sf-city")?.value.trim();
    if(!name||!date||!city){showToast("Please fill in name, date and city");return;}
    setState({submitLoading:true});
    try{
      const payload={
        name,
        event_type:document.getElementById("sf-type")?.value||"Community",
        start_date:date,
        start_time:document.getElementById("sf-time")?.value||null,
        location:document.getElementById("sf-location")?.value||null,
        address:document.getElementById("sf-address")?.value||null,
        city,
        state:document.getElementById("sf-state")?.value.toUpperCase()||null,
        zip:state.zip||null,
        description:document.getElementById("sf-desc")?.value||null,
        url:document.getElementById("sf-url")?.value||null,
        cost:document.getElementById("sf-cost")?.value||"Free",
        approved:true,
      };
      const r=await fetch(`${SUPABASE_URL}/rest/v1/submitted_events`,{
        method:"POST",
        headers:{
          "apikey":SUPABASE_KEY,
          "Authorization":`Bearer ${SUPABASE_KEY}`,
          "Content-Type":"application/json",
          "Prefer":"return=minimal"
        },
        body:JSON.stringify(payload)
      });
      if(!r.ok)throw new Error("Failed");
      state.submitLoading=false;
      state.submitSuccess=true;
      const existing2=document.getElementById("submit-overlay");
      if(existing2) existing2.remove();
      const div2=document.createElement("div");
      div2.innerHTML=renderSubmitModal();
      document.body.appendChild(div2.firstElementChild);
      bindSubmitEvents();
    }catch(e){
      setState({submitLoading:false});
      showToast("Something went wrong. Please try again.");
    }
  });
}

function bindEvents(){
  // Legal screen links
  document.querySelectorAll(".legal-link").forEach(el=>el.addEventListener("click",()=>{
    setState({legalScreen:el.dataset.screen});
  }));
  const legalBack=document.getElementById("legal-back");
  if(legalBack)legalBack.addEventListener("click",()=>setState({legalScreen:null}));
const modeEvents=document.getElementById("mode-events-btn");
  if(modeEvents)modeEvents.addEventListener("click",()=>setState({dataMode:"events"}));
  const modePlaces=document.getElementById("mode-places-btn");
  if(modePlaces)modePlaces.addEventListener("click",()=>setState({dataMode:"places"}));
  const gps=document.getElementById("gps-btn");
  if(gps)gps.addEventListener("click",detectLocation);
  const signinBtn=document.getElementById("signin-btn");
  if(signinBtn)signinBtn.addEventListener("click",()=>setState({authModal:"signin",authMode:"signin",authError:""}));
  const signoutBtn=document.getElementById("signout-btn");
  if(signoutBtn)signoutBtn.addEventListener("click",signOut);
  const inp=document.getElementById("search-input");
  if(inp){
    inp.addEventListener("input",e=>{
      const v=e.target.value;state.searchInput=v;state.searchError="";
      const sugg=getSuggestions(v);state.suggestions=sugg;renderSuggestions(sugg);
    });
    inp.addEventListener("keydown",e=>{if(e.key==="Enter"){state.suggestions=[];renderSuggestions([]);doSearch(state.searchInput);}});
  }
  const go=document.getElementById("search-go");
  if(go)go.addEventListener("click",()=>{state.suggestions=[];renderSuggestions([]);doSearch(state.searchInput);});
  document.querySelectorAll(".who-btn").forEach(el=>el.addEventListener("click",()=>setState({whoFilter:el.dataset.who})));
  document.querySelectorAll(".range-btn").forEach(el=>el.addEventListener("click",()=>{state.dateRange=el.dataset.range;render();}));
  
  document.querySelectorAll(".quick-city").forEach(el=>el.addEventListener("click",()=>{state.searchInput=el.dataset.city;doSearch(el.dataset.city);}));
  const listBtn=document.getElementById("list-view-btn");
  const mapBtn=document.getElementById("map-view-btn");
  if(listBtn)listBtn.addEventListener("click",()=>{if(state.viewMode!=="list"){state.viewMode="list";render();}});
  if(mapBtn)mapBtn.addEventListener("click",()=>{
    if(state.viewMode!=="map"){
      state.viewMode="map";render();
      setTimeout(()=>{
        const maxDays=DATE_RANGES.find(d=>d.id===state.dateRange)?.days||90;
        const filtered=state.events.filter(ev=>{const dv=ev.date||ev.startDate;return state.dateRange==="weekend"?isThisWeekendOrSooner(dv):withinDays(dv,maxDays);});
        let center=null;
        if(state.userLat&&state.userLng)center=[state.userLat,state.userLng];
        else{
          const withCoords=filtered.filter(ev=>ev.lat&&ev.lng&&!isNaN(parseFloat(ev.lat))&&!isNaN(parseFloat(ev.lng)));
          if(withCoords.length>0)center=[parseFloat(withCoords[0].lat),parseFloat(withCoords[0].lng)];
          else {
            // Use city center lookup as fallback
            const cityData=Object.values(CITY_ZIP).find(c=>c.city===state.info?.city);
            if(cityData){
              // Use ZIP to estimate lat/lng - center of US as last resort
              center=[36.8529,-76.0]; // Default to VB area
            }
          }
        }
        initMap(filtered,center||[39.5,-98.35]); // async - geocodes addresses in background
      },150);
    }
  });
  // Legal links
  document.querySelectorAll(".legal-link").forEach(el=>el.addEventListener("click",()=>{
    setState({legalScreen:el.dataset.screen});
  }));

  // Event search input - filter cards directly without re-rendering
  const eventSearchInput=document.getElementById("event-search-input");
  if(eventSearchInput){
    eventSearchInput.addEventListener("input",(e)=>{
      const pos=e.target.selectionStart;
      state.eventSearch=e.target.value.toLowerCase();
      render();
      // Re-render rebuilds the input, so restore focus and cursor position
      const inp=document.getElementById("event-search-input");
      if(inp){ inp.focus(); try{ inp.setSelectionRange(pos,pos); }catch(_){} }
    });
    eventSearchInput.addEventListener("focus",(e)=>{e.target.style.borderColor="rgba(99,102,241,0.5)";});
    eventSearchInput.addEventListener("blur",(e)=>{e.target.style.borderColor="rgba(255,255,255,0.1)";});
  }
  const clearSearch=document.getElementById("clear-event-search");
  if(clearSearch){
    clearSearch.addEventListener("click",()=>{
      state.eventSearch="";
      render();
    });
  }

  const back=document.getElementById("back-btn");
  if(back)back.addEventListener("click",()=>{
    state.userLat=null;state.userLng=null;
    setState({screen:"home",zip:"",events:[],info:null,openId:null,searchInput:"",suggestions:[],viewMode:"list",eventSearch:""});
  });

  // Submit event button
  const submitBtn=document.getElementById("submit-btn");
  if(submitBtn)submitBtn.addEventListener("click",()=>{
    showSubmitModal();
  });
  document.querySelectorAll(".card-row").forEach(el=>el.addEventListener("click",()=>{
    const id=el.dataset.id;const newId=state.openId===id?null:id;
    setState({openId:newId});
    if(newId&&!state.reviews[newId]){
      fetchReviews(newId).then(reviews=>{if(reviews.length>0){state.reviews={...state.reviews,[newId]:reviews};render();}});
    }
  }));
  document.querySelectorAll(".fav-btn").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();const id=el.dataset.id;const f=new Set(state.favs);f.has(id)?f.delete(id):f.add(id);setState({favs:f});}));
  document.querySelectorAll(".going-btn").forEach(el=>el.addEventListener("click",()=>toggleAttendance(el.dataset.id,decodeURIComponent(el.dataset.name))));
  document.querySelectorAll(".type-filter").forEach(el=>el.addEventListener("click",()=>{state.typeFilter=el.dataset.type;render();}));
  document.querySelectorAll(".who-filter").forEach(el=>el.addEventListener("click",()=>{state.whoFilter=el.dataset.who;render();}));
  document.querySelectorAll(".range-filter").forEach(el=>el.addEventListener("click",()=>{state.dateRange=el.dataset.range;render();}));
  document.querySelectorAll(".toggle-free").forEach(el=>el.addEventListener("click",()=>{state.freeOnly=!state.freeOnly;render();}));
  document.querySelectorAll(".clear-all").forEach(el=>el.addEventListener("click",()=>{state.typeFilter="All";state.whoFilter="all";state.freeOnly=false;state.dateRange="3months";render();}));
  document.querySelectorAll(".cal-btn").forEach(el=>el.addEventListener("click",()=>{const d=(el.dataset.date||"").replace(/-/g,"");if(d)window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${el.dataset.name}&dates=${d}/${d}&location=${el.dataset.addr}`,"_blank");}));
  document.querySelectorAll(".share-btn").forEach(el=>el.addEventListener("click",()=>{
    const name=decodeURIComponent(el.dataset.name);
    const txt=`${name} — ${el.dataset.date} at ${decodeURIComponent(el.dataset.loc)}. ${el.dataset.cost==="Free"?"Free! ":""}Check it out on Buzz 🎉`;
    if(navigator.share)navigator.share({title:name,text:txt,url:el.dataset.url||"https://buzzfinder.app"});
    else{navigator.clipboard?.writeText(txt);showToast("📋 Copied!");}
  }));
  document.querySelectorAll(".star-btn").forEach(el=>el.addEventListener("click",()=>{
    const id=el.dataset.id;const star=parseInt(el.dataset.star);
    state.reviewInput={...state.reviewInput,[id]:{...(state.reviewInput[id]||{}),rating:star}};render();
  }));
  document.querySelectorAll(".review-text").forEach(el=>el.addEventListener("input",e=>{
    const id=el.dataset.id;
    state.reviewInput={...state.reviewInput,[id]:{...(state.reviewInput[id]||{}),comment:e.target.value}};
  }));
  document.querySelectorAll(".submit-review").forEach(el=>el.addEventListener("click",async()=>{
    const id=el.dataset.id;const name=el.dataset.name;const input=state.reviewInput[id]||{};
    if(!input.rating)return;
    state.reviewLoading={...state.reviewLoading,[id]:true};render();
    await submitReview(id,name,input.rating,input.comment||"");
    const newReview={event_id:id,event_name:name,rating:input.rating,comment:input.comment||"",created_at:new Date().toISOString()};
    state.reviews={...state.reviews,[id]:[newReview,...(state.reviews[id]||[])]};
    state.reviewInput={...state.reviewInput,[id]:{rating:0,comment:""}};
    state.reviewLoading={...state.reviewLoading,[id]:false};
    showToast("✓ Review submitted!");render();
  }));
}
