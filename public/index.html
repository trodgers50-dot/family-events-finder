function resolveSearch(input) {
  const trimmed = input.trim();
  // ZIP code
  if (/^\d{5}$/.test(trimmed)) {
    return { zip: trimmed, fromCity: false };
  }
  // City name
  const key = trimmed.toLowerCase();
  const match = CITY_ZIP[key];
  if (match) return { ...match, fromCity: true };
  // Partial match
  const partial = Object.keys(CITY_ZIP).find(k => k.startsWith(key) || key.startsWith(k));
  if (partial) return { ...CITY_ZIP[partial], fromCity: true };
  return null;
}

// ── Suggestions ───────────────────────────────────────────────────────────────
function getSuggestions(input) {
  if (!input || input.length < 2) return [];
  const key = input.toLowerCase();
  return Object.entries(CITY_ZIP)
    .filter(([k]) => k.startsWith(key) || k.includes(key))
    .slice(0, 5)
    .map(([, v]) => v);
}

function getRegionInfo(zip){
  const z=parseInt(zip);
  if(z>=20000&&z<=24699)return{city:"Virginia Beach",state:"VA",region:"VA"};
  if(z>=10000&&z<=14999)return{city:"New York",state:"NY",region:"NY"};
  if(z>=90000&&z<=96199)return{city:"Los Angeles",state:"CA",region:"CA"};
  if(z>=75000&&z<=79999)return{city:"Houston",state:"TX",region:"TX"};
  if(z>=32000&&z<=34999)return{city:"Miami",state:"FL",region:"FL"};
  if(z>=60000&&z<=62999)return{city:"Chicago",state:"IL",region:"IL"};
  if(z>=30000&&z<=31999)return{city:"Atlanta",state:"GA",region:"GA"};
  if(z>=98000&&z<=98199)return{city:"Seattle",state:"WA",region:"WA"};
  if(z>=80000&&z<=80299)return{city:"Denver",state:"CO",region:"CO"};
  if(z>=85000&&z<=85099)return{city:"Phoenix",state:"AZ",region:"AZ"};
  return{city:"your area",state:"",region:"DEFAULT"};
}
function latLngToRegion(lat,lng){
  if(lat>=36&&lat<=37.5&&lng>=-77&&lng<=-74)return{city:"Virginia Beach",state:"VA",region:"VA",zip:"23464"};
  if(lat>=40&&lat<=41&&lng>=-75&&lng<=-73)return{city:"New York",state:"NY",region:"NY",zip:"10001"};
  if(lat>=33&&lat<=34.5&&lng>=-119&&lng<=-117)return{city:"Los Angeles",state:"CA",region:"CA",zip:"90001"};
  if(lat>=29&&lat<=30&&lng>=-96&&lng<=-94)return{city:"Houston",state:"TX",region:"TX",zip:"77001"};
  if(lat>=25&&lat<=26.5&&lng>=-81&&lng<=-79)return{city:"Miami",state:"FL",region:"FL",zip:"33101"};
  if(lat>=41&&lat<=42.5&&lng>=-88&&lng<=-87)return{city:"Chicago",state:"IL",region:"IL",zip:"60601"};
  if(lat>=33&&lat<=34.5&&lng>=-85&&lng<=-83)return{city:"Atlanta",state:"GA",region:"GA",zip:"30301"};
  if(lat>=47&&lat<=48&&lng>=-123&&lng<=-121)return{city:"Seattle",state:"WA",region:"WA",zip:"98101"};
  if(lat>=39&&lat<=40&&lng>=-105.5&&lng<=-104)return{city:"Denver",state:"CO",region:"CO",zip:"80201"};
  if(lat>=33&&lat<=34&&lng>=-113&&lng<=-111)return{city:"Phoenix",state:"AZ",region:"AZ",zip:"85001"};
  return{city:"your area",state:"",region:"DEFAULT",zip:"00000"};
}

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function formatDate(d){if(!d)return"TBD";try{return new Date(d+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}catch{return d;}}
function isWeekend(ds){if(!ds)return false;const t=new Date();t.setHours(0,0,0,0);const day=t.getDay();const fri=new Date(t);fri.setDate(t.getDate()+((5-day+7)%7));const sun=new Date(t);sun.setDate(t.getDate()+((7-day)%7||7));const ev=new Date(ds+"T00:00:00");return ev>=fri&&ev<=sun;}
function getWeather(ds,r){
  const W={VA:[{i:"🌨",l:"38°",t:"Cold"},{i:"🌦",l:"52°",t:"Cool"},{i:"🌤",l:"62°",t:"Mild"},{i:"⛅",l:"70°",t:"Nice"},{i:"☀",l:"78°",t:"Warm"},{i:"🌡",l:"88°",t:"Hot"},{i:"🌡",l:"90°",t:"Hot"},{i:"🌡",l:"88°",t:"Hot"},{i:"☀",l:"80°",t:"Warm"},{i:"🌤",l:"68°",t:"Mild"},{i:"🌥",l:"56°",t:"Cool"},{i:"🌨",l:"44°",t:"Cold"}],DEFAULT:[{i:"❄",l:"32°",t:"Cold"},{i:"🌥",l:"42°",t:"Cold"},{i:"🌤",l:"55°",t:"Mild"},{i:"⛅",l:"65°",t:"Nice"},{i:"☀",l:"72°",t:"Warm"},{i:"🌡",l:"82°",t:"Hot"},{i:"🌡",l:"85°",t:"Hot"},{i:"🌡",l:"83°",t:"Hot"},{i:"☀",l:"75°",t:"Warm"},{i:"🌤",l:"63°",t:"Cool"},{i:"🌥",l:"50°",t:"Cool"},{i:"❄",l:"38°",t:"Cold"}]};
  const mo=new Date((ds||"2026-07-01")+"T00:00:00").getMonth();
  return(W[r]||W.DEFAULT)[mo];
}

  ];
  return T.map((t,i)=>{
    const date=addDays(t.days);
    return{id:String(i+1),name:t.name,type:t.type,emoji:TYPE_ICONS[t.type]||"●",photo:getPhoto(t.type,String(i+1)),date,location:venues[i%venues.length],address:`${venues[i%venues.length]}, ${city}${info.state?", "+info.state:""}`,cost:t.cost,desc:t.desc,rating:t.rating,weather:getWeather(date,info.region),isWeekend:isWeekend(date),sched:t.sched,source:"Local"};
  });
}

async function fetchLiveEvents(zip){
  try{
    const res=await fetch(`${PROXY_URL}?zip=${zip}`);
    if(!res.ok)throw new Error("API error");
    const data=await res.json();
    if(!data.events||data.events.length===0)throw new Error("No events");
    return data.events.map(ev=>({
      ...ev,
      emoji:TYPE_ICONS[ev.type]||"●",
      photo:getPhoto(ev.type,ev.id),
      weather:getWeather(ev.startDate,getRegionInfo(zip).region),
      isWeekend:isWeekend(ev.startDate),
      date:ev.startDate,
      sched:ev.subEvents?.map(s=>`${s.time} · ${s.name}`)||[],
      rating:ev.familyRating||4,
    }));
  }catch(e){
    console.log("Live fetch failed:",e.message);
    return null;
  }
}

let state={

  favs:new Set(), toast:"", gpsLoading:false, loading:false, liveData:false,
  suggestions:[], searchError:""
};
function setState(u){Object.assign(state,u);render();}
function showToast(msg){setState({toast:msg});setTimeout(()=>setState({toast:""}),2500);}
function m(t){return TYPE_META[t]||{color:"#94a3b8"};}

// ── Search ────────────────────────────────────────────────────────────────────
async function doSearch(input, regionOverride){
  const resolved = regionOverride || resolveSearch(input);
  if(!resolved){
    setState({searchError:`Couldn't find "${input}". Try a city name or 5-digit ZIP.`});
    return;
  }
  const zip = resolved.zip;
  const info = resolved.city ? resolved : getRegionInfo(zip);

  setState({loading:true, screen:"results", events:[], openId:null,
    typeFilter:"All", freeOnly:false, weekendOnly:false,
    liveData:false, info, zip, searchError:""});

  const live = await fetchLiveEvents(zip);
  if(live && live.length > 0){
    setState({events:live, loading:false, liveData:true});
    showToast(`✓ ${live.length} live events loaded`);
  } else {
    setState({events:generateFallback(zip, info), loading:false, liveData:false});
  }
}

function detectLocation(){
  if(!navigator.geolocation){showToast("GPS not available");return;}
  setState({gpsLoading:true});
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    const r=latLngToRegion(lat,lng);
    setState({gpsLoading:false, searchInput:r.city});
    doSearch(r.city, r);
    showToast(`📍 Found you in ${r.city}`);
  },()=>{setState({gpsLoading:false});showToast("Couldn't get location — try typing your city");},{timeout:8000});
}

      <!-- Divider -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.06)"></div>
        <span style="color:rgba(255,255,255,0.2);font-size:11px;letter-spacing:1px;text-transform:uppercase">or search</span>
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.06)"></div>
      </div>

      <!-- Search input -->
      <div style="position:relative;margin-bottom:${sugg.length?0:16}px">
        <div style="display:flex;gap:0;background:rgba(255,255,255,0.07);border-radius:14px;border:1.5px solid ${state.searchInput?"rgba(99,102,241,0.4)":"rgba(255,255,255,0.08)"};overflow:hidden;transition:border-color 0.2s">
          <input id="search-input" type="text" value="${state.searchInput}"
            placeholder="City name or ZIP code…"
            autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" dir="ltr"
            style="flex:1;background:transparent;border:none;outline:none;padding:14px 16px;font-size:16px;color:#fff;min-width:0;"
          />
          <div id="search-go" style="padding:0 18px;display:flex;align-items:center;justify-content:center;background:${state.searchInput.length>1?"#6366f1":"rgba(255,255,255,0.05)"};cursor:${state.searchInput.length>1?"pointer":"default"};transition:background 0.2s;font-size:16px">
            →
          </div>
        </div>
      </div>

      <!-- Suggestions dropdown -->
      ${sugg.length?`
      <div style="background:rgba(20,20,30,0.98);border:1px solid rgba(255,255,255,0.08);border-radius:12px;margin-bottom:16px;overflow:hidden;animation:fadeIn 0.15s ease">
        ${sugg.map(s=>`
          <div class="suggestion" data-city="${s.city}" data-state="${s.state}" data-zip="${s.zip}" data-region="${s.region}"
            style="padding:12px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.04)">
            <span style="font-size:14px;color:#f1f5f9;font-weight:500">${s.city}, ${s.state}</span>
            <span style="font-size:12px;color:rgba(255,255,255,0.25)">${s.zip}</span>
          </div>
        `).join("")}
      </div>`:""}

      <!-- Error -->
      ${state.searchError?`<div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:16px;text-align:left">${state.searchError}</div>`:""}

      <!-- Popular cities -->
      <div style="margin-top:4px">
        <div style="font-size:10px;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Popular cities</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center">
          ${["Virginia Beach","New York","Miami","Chicago","Los Angeles","Nashville","Atlanta","Seattle"].map(c=>`
            <div class="quick-city" data-city="${c}" style="padding:5px 12px;border-radius:999px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.45);font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.06);transition:all 0.15s">${c}</div>
          `).join("")}
        </div>
      </div>

    </div>
  </div>`;
}

function renderResults(){
  const filtered=state.events.filter(ev=>{
    if(state.typeFilter!=="All"&&ev.type!==state.typeFilter)return false;
    if(state.freeOnly&&ev.cost!=="Free")return false;
    if(state.weekendOnly&&!ev.isWeekend)return false;
    return true;
  });
  const types=["All",...new Set(state.events.map(e=>e.type))];
  const freeCount=state.events.filter(e=>e.cost==="Free").length;
  const weekendCount=state.events.filter(e=>e.isWeekend).length;

  if(state.loading){
    return`<div style="min-height:100vh;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
      <div style="width:40px;height:40px;border-radius:50%;border:3px solid rgba(99,102,241,0.2);border-top-color:#6366f1;animation:spin 0.8s linear infinite"></div>
      <p style="color:rgba(255,255,255,0.4);font-size:14px">Finding events near ${state.info?.city||state.zip}…</p>
      <p style="color:rgba(255,255,255,0.2);font-size:12px">Checking live sources</p>
    </div>`;
  }

  const cards=filtered.map((ev,idx)=>{
    const meta=m(ev.type);
    const isOpen=state.openId===ev.id;
    const isFav=state.favs.has(ev.id);
    const srcColor=ev.source==="Ticketmaster"?"#60a5fa":ev.source==="Google Events"?"#34d399":ev.source==="Virginia Beach City"?"#fbbf24":"rgba(255,255,255,0.2)";
    const srcLabel=ev.source==="Ticketmaster"?"🎫":ev.source==="Google Events"?"🔍":ev.source==="Virginia Beach City"?"🏛":"◉";
    return`
    <div style="border-radius:16px;overflow:hidden;background:${isOpen?"rgba(255,255,255,0.04)":"transparent"};border:1px solid ${isOpen?"rgba(255,255,255,0.07)":"transparent"};margin-bottom:${isOpen?"6px":"0"};transition:all 0.2s">
      ${isOpen?`<div style="position:relative;height:160px;overflow:hidden;background:rgba(255,255,255,0.03)"><img src="${ev.photo}" alt="" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;opacity:0.7"/><div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,15,0.85) 0%,transparent 55%)"></div><div style="position:absolute;top:10px;left:12px;padding:4px 10px;border-radius:999px;background:rgba(0,0,0,0.5);color:${meta.color};font-size:11px;font-weight:700">${ev.type}</div>${ev.isWeekend?`<div style="position:absolute;top:10px;right:12px;padding:4px 10px;border-radius:999px;background:rgba(99,102,241,0.7);color:#fff;font-size:11px;font-weight:700">This Weekend</div>`:""}</div>`:""}
      <div class="card-row" data-id="${ev.id}" style="display:flex;align-items:center;gap:12px;padding:14px 4px;cursor:pointer;border-bottom:${idx<filtered.length-1&&!isOpen?"1px solid rgba(255,255,255,0.04)":"none"}">
        <div style="width:44px;height:44px;border-radius:12px;background:${meta.color}15;border:1px solid ${meta.color}25;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:${meta.color}">${ev.emoji}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:3px;flex-wrap:wrap">
            ${!isOpen?`<span style="font-size:10px;font-weight:700;color:${meta.color};text-transform:uppercase;letter-spacing:0.8px">${ev.type}</span>`:""}
            ${ev.isWeekend&&!isOpen?`<span style="font-size:9px;font-weight:600;color:#a5b4fc;background:rgba(99,102,241,0.1);padding:1px 5px;border-radius:3px">Weekend</span>`:""}
            ${ev.cost==="Free"?`<span style="font-size:9px;font-weight:600;color:#6ee7b7;background:rgba(16,185,129,0.08);padding:1px 5px;border-radius:3px">Free</span>`:""}
            <span style="font-size:9px;color:${srcColor};opacity:0.8">${srcLabel}</span>
          </div>
          <div style="font-weight:600;font-size:14px;color:#f1f5f9;line-height:1.3;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.name}</div>
          <div style="display:flex;gap:8px">
            <span style="font-size:11px;color:rgba(255,255,255,0.3)">${formatDate(ev.date)}</span>
            <span style="font-size:11px;color:rgba(255,255,255,0.18);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">· ${ev.location}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0">
          <div class="fav-btn" data-id="${ev.id}" style="font-size:16px;cursor:pointer;opacity:${isFav?1:0.25};color:${isFav?"#fbbf24":"#fff"}">${isFav?"★":"☆"}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.18);transform:${isOpen?"rotate(180deg)":"rotate(0deg)"};transition:transform 0.2s">▾</div>
        </div>
      </div>
      ${isOpen?`
      <div style="padding:4px 14px 16px">
        <div style="display:flex;gap:8px;margin-bottom:14px">
          ${ev.weather?`<div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:8px 12px;border:1px solid rgba(255,255,255,0.06)"><div style="font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:2px;text-transform:uppercase">Weather</div><div style="font-size:13px;font-weight:600;color:#f1f5f9">${ev.weather.i} ${ev.weather.l} · ${ev.weather.t}</div></div>`:""}
          <div style="flex:1;background:${meta.color}10;border-radius:10px;padding:8px 12px;border:1px solid ${meta.color}18"><div style="font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:2px;text-transform:uppercase">Cost</div><div style="font-size:13px;font-weight:700;color:${meta.color}">${ev.cost}</div></div>
        </div>
        ${ev.desc||ev.description?`<p style="font-size:13px;color:rgba(255,255,255,0.45);line-height:1.65;margin-bottom:14px">${ev.desc||ev.description}</p>`:""}
        ${ev.address?`<div style="font-size:12px;color:rgba(255,255,255,0.25);margin-bottom:12px">📍 ${ev.address}</div>`:""}
        ${ev.sched&&ev.sched.length?`
        <div style="font-size:11px;color:rgba(255,255,255,0.18);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.8px">Schedule</div>
        ${ev.sched.map((s,i)=>{const p=s.split(" · ");return`<div style="display:flex;gap:12px;padding:8px 0;border-bottom:${i<ev.sched.length-1?"1px solid rgba(255,255,255,0.04)":"none"}"><span style="font-size:12px;color:${meta.color};min-width:72px;font-weight:600">${p[0]}</span><span style="font-size:12px;color:rgba(255,255,255,0.4)">${p[1]||""}</span></div>`;}).join("")}`:""}
        <div style="display:flex;gap:8px;margin-top:14px">
          <div class="cal-btn" data-name="${encodeURIComponent(ev.name)}" data-date="${ev.date||""}" data-addr="${encodeURIComponent(ev.address||ev.location)}" style="flex:1;padding:11px;border-radius:11px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.07)">📅 Calendar</div>
          ${ev.url?`<a href="${ev.url}" target="_blank" style="flex:1;padding:11px;border-radius:11px;background:${meta.color}15;color:${meta.color};font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:1px solid ${meta.color}25;text-decoration:none">🎟 Tickets</a>`:`<div class="share-btn" data-name="${encodeURIComponent(ev.name)}" data-date="${formatDate(ev.date)}" data-loc="${encodeURIComponent(ev.location)}" data-cost="${ev.cost}" style="flex:1;padding:11px;border-radius:11px;background:${meta.color}15;color:${meta.color};font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:1px solid ${meta.color}25">Share ↗</div>`}
        </div>
      </div>`:""}
    </div>`;
  }).join("");

  return`
  ${state.toast?`<div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:2000;background:rgba(255,255,255,0.1);backdrop-filter:blur(12px);color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,0.15);white-space:nowrap">${state.toast}</div>`:""}
  <div style="min-height:100vh;background:#0a0a0f;color:#fff">
    <div style="padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);z-index:100">
      <div style="display:flex;align-items:center;gap:10px;max-width:700px;margin:0 auto">
        <div id="back-btn" style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;border:1px solid rgba(255,255,255,0.08);flex-shrink:0">←</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:15px;letter-spacing:-0.3px">${state.info?.city}${state.info?.state?`, ${state.info.state}`:""} <span style="color:rgba(255,255,255,0.25);font-weight:400;font-size:12px">· ${state.zip}</span></div>
          <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:1px">${state.events.length} events · ${state.liveData?'<span style="color:#6ee7b7">● Live</span>':'<span style="color:rgba(255,255,255,0.2)">● Generated</span>'}</div>
        </div>
        <div id="new-search-btn" style="padding:6px 12px;border-radius:10px;background:rgba(99,102,241,0.12);color:#a5b4fc;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(99,102,241,0.2);flex-shrink:0">New Search</div>
      </div>
      <div style="display:flex;gap:5px;margin-top:8px;max-width:700px;margin:8px auto 0;flex-wrap:wrap">
        <span style="padding:3px 9px;border-radius:8px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);font-size:11px;font-weight:600">${state.events.length} Events</span>
        <span style="padding:3px 9px;border-radius:8px;background:rgba(16,185,129,0.08);color:#6ee7b7;font-size:11px;font-weight:600">${freeCount} Free</span>
        ${weekendCount?`<span style="padding:3px 9px;border-radius:8px;background:rgba(99,102,241,0.08);color:#a5b4fc;font-size:11px;font-weight:600">${weekendCount} This Weekend</span>`:""}
      </div>
    </div>
    <div style="max-width:700px;margin:0 auto;padding:12px 14px 80px">
      <div style="margin-bottom:12px">
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
          ${types.map(t=>{const active=state.typeFilter===t;const meta=m(t);return`<div class="type-filter" data-type="${t}" style="padding:4px 11px;border-radius:999px;background:${active?meta.color:"rgba(255,255,255,0.05)"};color:${active?"#fff":"rgba(255,255,255,0.4)"};font-size:12px;font-weight:${active?700:400};cursor:pointer;border:1px solid ${active?meta.color:"rgba(255,255,255,0.05)"}">${t}</div>`;}).join("")}
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <div class="toggle-free" style="padding:4px 11px;border-radius:999px;background:${state.freeOnly?"rgba(16,185,129,0.12)":"rgba(255,255,255,0.04)"};color:${state.freeOnly?"#6ee7b7":"rgba(255,255,255,0.25)"};font-size:12px;cursor:pointer;border:1px solid ${state.freeOnly?"#6ee7b7":"rgba(255,255,255,0.05)"}">Free Only</div>
          <div class="toggle-weekend" style="padding:4px 11px;border-radius:999px;background:${state.weekendOnly?"rgba(99,102,241,0.12)":"rgba(255,255,255,0.04)"};color:${state.weekendOnly?"#a5b4fc":"rgba(255,255,255,0.25)"};font-size:12px;cursor:pointer;border:1px solid ${state.weekendOnly?"#a5b4fc":"rgba(255,255,255,0.05)"}">This Weekend</div>
          <div class="clear-filters" style="padding:4px 11px;border-radius:999px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.2);font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.05)">Clear</div>
        </div>
      </div>
      <p style="font-size:11px;color:rgba(255,255,255,0.18);margin-bottom:12px;letter-spacing:0.5px;text-transform:uppercase">${filtered.length} of ${state.events.length} events</p>
      ${filtered.length===0?`<div style="text-align:center;padding:48px 0"><p style="color:rgba(255,255,255,0.25);font-size:14px">No events match your filters</p><div class="clear-filters" style="display:inline-block;margin-top:12px;padding:8px 18px;border-radius:10px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;border:1px solid rgba(255,255,255,0.07)">Clear filters</div></div>`:cards}
    </div>
  </div>`;
}

function bindEvents(){
  // GPS
  const gps=document.getElementById("gps-btn");
  if(gps)gps.addEventListener("click",detectLocation);

  // Search input
  const inp=document.getElementById("search-input");
  if(inp){
    inp.addEventListener("input",e=>{
      const v=e.target.value;
      const sugg=getSuggestions(v);
      setState({searchInput:v, suggestions:sugg, searchError:""});
    });
    inp.addEventListener("keydown",e=>{
      if(e.key==="Enter"){
        setState({suggestions:[]});
        doSearch(state.searchInput);
      }
    });
    // Refocus after render
    setTimeout(()=>{ const i=document.getElementById("search-input"); if(i&&document.activeElement!==i) i.focus(); },50);
  }

  // Search go button
  const go=document.getElementById("search-go");
  if(go)go.addEventListener("click",()=>{setState({suggestions:[]});doSearch(state.searchInput);});

  // Suggestions
  document.querySelectorAll(".suggestion").forEach(el=>{
    el.addEventListener("click",()=>{
      const r={city:el.dataset.city,state:el.dataset.state,zip:el.dataset.zip,region:el.dataset.region};
      setState({searchInput:r.city+", "+r.state, suggestions:[]});
      doSearch(r.city, r);
    });
  });

  // Quick city pills
  document.querySelectorAll(".quick-city").forEach(el=>{
    el.addEventListener("click",()=>{
      const city=el.dataset.city;
      setState({searchInput:city, suggestions:[]});
      doSearch(city);
    });
  });

  // Back / new search
  const back=document.getElementById("back-btn");
  if(back)back.addEventListener("click",()=>setState({screen:"home",zip:"",events:[],info:null,openId:null,searchInput:"",suggestions:[]}));
  const ns=document.getElementById("new-search-btn");
  if(ns)ns.addEventListener("click",()=>setState({screen:"home",zip:"",events:[],info:null,openId:null,searchInput:"",suggestions:[]}));

  // Cards
  document.querySelectorAll(".card-row").forEach(el=>{
    el.addEventListener("click",()=>{const id=el.dataset.id;setState({openId:state.openId===id?null:id});});
  });
  document.querySelectorAll(".fav-btn").forEach(el=>{
    el.addEventListener("click",e=>{e.stopPropagation();const id=el.dataset.id;const f=new Set(state.favs);f.has(id)?f.delete(id):f.add(id);setState({favs:f});});
  });
  document.querySelectorAll(".type-filter").forEach(el=>{el.addEventListener("click",()=>setState({typeFilter:el.dataset.type}));});
  document.querySelectorAll(".toggle-free").forEach(el=>{el.addEventListener("click",()=>setState({freeOnly:!state.freeOnly}));});
  document.querySelectorAll(".toggle-weekend").forEach(el=>{el.addEventListener("click",()=>setState({weekendOnly:!state.weekendOnly}));});
  document.querySelectorAll(".clear-filters").forEach(el=>{el.addEventListener("click",()=>setState({typeFilter:"All",freeOnly:false,weekendOnly:false}));});
  document.querySelectorAll(".cal-btn").forEach(el=>{
    el.addEventListener("click",()=>{const d=(el.dataset.date||"").replace(/-/g,"");if(d)window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${el.dataset.name}&dates=${d}/${d}&location=${el.dataset.addr}`,"_blank");});
  });
  document.querySelectorAll(".share-btn").forEach(el=>{
    el.addEventListener("click",()=>{const txt=`${decodeURIComponent(el.dataset.name)} — ${el.dataset.date} at ${decodeURIComponent(el.dataset.loc)}. ${el.dataset.cost==="Free"?"Free!":""}`;if(navigator.share)navigator.share({title:decodeURIComponent(el.dataset.name),text:txt});else{navigator.clipboard?.writeText(txt);showToast("Copied!");}});
  });
}

render();
</script>
</body>
</html>
