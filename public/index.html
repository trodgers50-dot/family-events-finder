// ── Reviews (Supabase) ────────────────────────────────────────────────────────
async function submitReview(eventId, eventName, rating, comment) {
  if(!SUPABASE_URL || SUPABASE_URL === "SUPABASE_URL_HERE") return null;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        event_id: eventId,
        event_name: eventName,
        rating,
        comment,
        created_at: new Date().toISOString()
      })
    });
    return res.ok;
  } catch(e) { return false; }
}

async function fetchReviews(eventId) {
  if(!SUPABASE_URL || SUPABASE_URL === "SUPABASE_URL_HERE") return [];
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/reviews?event_id=eq.${encodeURIComponent(eventId)}&order=created_at.desc&limit=10`,
      { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } }
    );
    return res.ok ? await res.json() : [];
  } catch(e) { return []; }
}

function resolveSearch(input){
  const t=input.trim();
  if(/^\d{5}$/.test(t))return{zip:t,fromCity:false};
  const key=t.toLowerCase();
  const match=CITY_ZIP[key];
  if(match)return{...match,fromCity:true};
  const partial=Object.keys(CITY_ZIP).find(k=>k.startsWith(key));
  if(partial)return{...CITY_ZIP[partial],fromCity:true};
  return null;
}
function getSuggestions(input){
  if(!input||input.length<2)return[];
  const key=input.toLowerCase();
  return Object.entries(CITY_ZIP).filter(([k])=>k.startsWith(key)||k.includes(key)).slice(0,5).map(([,v])=>v);
}

function getRegionInfo(zip){
  const z=parseInt(zip);
  if(z>=20000&&z<=24699)return{city:"Virginia Beach",state:"VA",region:"VA"};
  if(z>=10000&&z<=14999)return{city:"New York",state:"NY",region:"NY"};
  if(z>=90000&&z<=96199)return{city:"Los Angeles",state:"CA",region:"CA"};
  if(z>=75000&&z<=79999)return{city:"Houston",state:"TX",region:"TX"};
  if(z>=32000&&z<=34999)return{city:"Miami",state:"FL",region:"FL"};
  if(z>=60000&&z<=62999)return{city:"Chicago",state:"IL",region:"IL"};
  if(z>=30000&&z<=31999)return{city:"Atlanta",state:"GA",region:"GA"};
  if(z>=98000&&z<=98199)return{city:"Seattle",state:"WA",region:"WA"};
  if(z>=80000&&z<=80299)return{city:"Denver",state:"CO",region:"CO"};
  if(z>=85000&&z<=85099)return{city:"Phoenix",state:"AZ",region:"AZ"};
  return{city:"your area",state:"",region:"DEFAULT"};
}
function latLngToRegion(lat,lng){
  if(lat>=36&&lat<=37.5&&lng>=-77&&lng<=-74)return{city:"Virginia Beach",state:"VA",region:"VA",zip:"23464"};
  if(lat>=40&&lat<=41&&lng>=-75&&lng<=-73)return{city:"New York",state:"NY",region:"NY",zip:"10001"};
  if(lat>=33&&lat<=34.5&&lng>=-119&&lng<=-117)return{city:"Los Angeles",state:"CA",region:"CA",zip:"90001"};
  if(lat>=29&&lat<=30&&lng>=-96&&lng<=-94)return{city:"Houston",state:"TX",region:"TX",zip:"77001"};
  if(lat>=25&&lat<=26.5&&lng>=-81&&lng<=-79)return{city:"Miami",state:"FL",region:"FL",zip:"33101"};
  if(lat>=41&&lat<=42.5&&lng>=-88&&lng<=-87)return{city:"Chicago",state:"IL",region:"IL",zip:"60601"};
  if(lat>=33&&lat<=34.5&&lng>=-85&&lng<=-83)return{city:"Atlanta",state:"GA",region:"GA",zip:"30301"};
  if(lat>=47&&lat<=48&&lng>=-123&&lng<=-121)return{city:"Seattle",state:"WA",region:"WA",zip:"98101"};
  if(lat>=39&&lat<=40&&lng>=-105.5&&lng<=-104)return{city:"Denver",state:"CO",region:"CO",zip:"80201"};
  return{city:"your area",state:"",region:"DEFAULT",zip:"00000"};
}

// Sanitize text for safe insertion into HTML attributes and template literals
function san(str){
  if(!str) return "";
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;")
    .replace(/`/g,"&#96;")
    .replace(/\$/g,"&#36;");
}

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function formatDate(d){
  if(!d)return"TBD";
  try{
    const dt=new Date(d+"T00:00:00");
    const today=new Date(); today.setHours(0,0,0,0);
    const diff=Math.round((dt-today)/(1000*60*60*24));
    if(diff===0)return"Today";
    if(diff===1)return"Tomorrow";
    if(diff<=6)return dt.toLocaleDateString("en-US",{weekday:"long"});
    return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  }catch{return d;}
}
function isThisWeekend(ds){
  if(!ds)return false;
  const t=new Date();t.setHours(0,0,0,0);
  const day=t.getDay();
  const fri=new Date(t);fri.setDate(t.getDate()+((5-day+7)%7));
  const sun=new Date(t);sun.setDate(t.getDate()+((7-day)%7||7));
  const ev=new Date(ds+"T00:00:00");
  return ev>=fri&&ev<=sun;
}
function withinDays(ds, days){
  if(!ds)return true;
  const today=new Date();today.setHours(0,0,0,0);
  const cutoff=new Date(today);cutoff.setDate(today.getDate()+days);
  const ev=new Date(ds+"T00:00:00");
  return ev>=today&&ev<=cutoff;
}

  const mo=new Date((ds||"2026-07-01")+"T00:00:00").getMonth();

async function fetchLiveEvents(zip){
  try{
    const res=await fetch(`${PROXY_URL}?zip=${zip}`);
    if(!res.ok)throw new Error("API error");
    const data=await res.json();
    if(!data.events||data.events.length===0)throw new Error("No events");
    return data.events.map(ev=>({
      ...ev,
      emoji:m(ev.type).icon,
      photo:getPhoto(ev.type,ev.id),
      weather:getWeather(ev.startDate,getRegionInfo(zip).region),
      isWeekend:isThisWeekend(ev.startDate),
      date:ev.startDate,
      sched:ev.subEvents?.map(s=>`${s.time} · ${s.name}`)||[],
      rating:ev.familyRating||4,
      who:["all"],
    }));
  }catch(e){
    console.log("Live fetch failed:",e.message);
    return null;
  }
}

// ── Search ────────────────────────────────────────────────────────────────────
async function doSearch(input, regionOverride){
  const resolved=regionOverride||resolveSearch(input);
  if(!resolved){setState({searchError:`Couldn't find "${input}". Try a city name or ZIP.`});return;}
  const zip=resolved.zip;
  const info=resolved.city?resolved:getRegionInfo(zip);

  // Phase 1 — show generated events instantly
  const fallback=generateFallback(zip,info);
  setState({
    loading:false, liveLoading:true, screen:"results",
    events:fallback, openId:null, typeFilter:"All",
    whoFilter:"all", freeOnly:false, liveData:false,
    info, zip, searchError:""
  });

  // Phase 2 — fetch live events in background, merge when ready
  try {
    const res = await fetch(`${PROXY_URL}?zip=${zip}`);
    if(!res.ok) throw new Error("API error");
    const data = await res.json();
    if(data.events && data.events.length > 0){
      const liveEvents = data.events.map(ev=>({
        ...ev,
        emoji: m(ev.type).icon||"●",
        photo: ev.image || getPhoto(ev.type, ev.id),
        weather: getWeather(ev.startDate, getRegionInfo(zip).region),
        isWeekend: isThisWeekend(ev.startDate),
        date: ev.startDate,
        sched: ev.subEvents?.map(s=>`${s.time} · ${s.name}`)||[],
        rating: ev.familyRating||4,
        who: ["all"],
      }));
      // Merge live events with fallback — live events first, then any fallback not duplicated
      const liveNames = new Set(liveEvents.map(e=>e.name.toLowerCase().slice(0,15)));
      const uniqueFallback = fallback.filter(e=>!liveNames.has(e.name.toLowerCase().slice(0,15)));
      const merged = [...liveEvents, ...uniqueFallback];
      // Sort all events chronologically
      merged.sort((a,b)=>{
        if(!a.date&&!b.date)return 0;
        if(!a.date)return 1;
        if(!b.date)return -1;
        return a.date.localeCompare(b.date);
      });
      setState({events:merged, liveLoading:false, liveData:true});
      showToast(`✓ ${liveEvents.length} live events added`);
    } else {
      setState({liveLoading:false, liveData:false});
    }
  } catch(e) {
    console.log("Live fetch failed:", e.message);
    setState({liveLoading:false, liveData:false});
  }
}

function detectLocation(){
  if(!navigator.geolocation){showToast("GPS not available");return;}
  setState({gpsLoading:true});
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    const r=latLngToRegion(lat,lng);
    setState({gpsLoading:false,searchInput:r.city});
    doSearch(r.city,r);
    showToast(`📍 Found you in ${r.city}`);
  },()=>{setState({gpsLoading:false});showToast("Couldn't get location");},{timeout:8000});
}

          ${DATE_RANGES.map(d=>`
            <div class="range-btn" data-range="${d.id}" style="padding:6px 12px;border-radius:999px;background:${state.dateRange===d.id?"rgba(236,72,153,0.15)":"rgba(255,255,255,0.04)"};border:1px solid ${state.dateRange===d.id?"rgba(236,72,153,0.35)":"rgba(255,255,255,0.06)"};color:${state.dateRange===d.id?"#f9a8d4":"rgba(255,255,255,0.35)"};font-size:12px;cursor:pointer;transition:all 0.15s">
              ${d.label}
            </div>
          `).join("")}
        </div>
      </div>

      <!-- Popular cities -->
      <div>
        <div style="font-size:10px;color:rgba(255,255,255,0.18);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Popular</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${["Virginia Beach","New York","Miami","Chicago","Nashville","Austin","Atlanta","Seattle","Las Vegas","New Orleans","Denver","Boston","Philadelphia","San Diego","Portland"].map(c=>`
            <div class="quick-city" data-city="${c}" style="padding:5px 11px;border-radius:999px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.35);font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.05);transition:all 0.15s">${c}</div>
          `).join("")}
        </div>
      </div>

    </div>
  </div>`;
}

function renderResults(){
  const maxDays=DATE_RANGES.find(d=>d.id===state.dateRange)?.days||90;
  // Debug: log current filter state
  // console.log("Filtering:", state.dateRange, "maxDays:", maxDays, "events:", state.events.length);
  const filtered=state.events.filter(ev=>{
    if(state.typeFilter!=="All"&&ev.type!==state.typeFilter)return false;
    if(state.freeOnly&&ev.cost!=="Free")return false;
    if(state.whoFilter!=="all"&&ev.who&&!ev.who.includes(state.whoFilter)&&!ev.who.includes("all"))return false;
    if(!withinDays(ev.date,maxDays))return false;
    return true;
  });
  // Always sort chronologically at render time
  filtered.sort((a,b)=>{
    if(!a.date&&!b.date)return 0;
    if(!a.date)return 1;
    if(!b.date)return -1;
    return a.date.localeCompare(b.date);
  });

  const types=["All",...new Set(state.events.map(e=>e.type))];
  const freeCount=filtered.filter(e=>e.cost==="Free").length;
  const weekendCount=filtered.filter(e=>e.isWeekend).length;
  const selectedRange=DATE_RANGES.find(d=>d.id===state.dateRange);

  if(state.loading){
    return`<div style="min-height:100vh;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
      <div style="width:40px;height:40px;border-radius:50%;border:3px solid rgba(99,102,241,0.15);border-top-color:#6366f1;animation:spin 0.8s linear infinite"></div>
      <p style="color:rgba(255,255,255,0.35);font-size:14px">Finding things to do in ${state.info?.city||state.zip}…</p>
    </div>`;
  }

  const cards=filtered.map((ev,idx)=>{
    const meta=m(ev.type);
    const isOpen=state.openId===ev.id;
    const isFav=state.favs.has(ev.id);
    return`
    <div style="border-radius:16px;overflow:hidden;background:${isOpen?"rgba(255,255,255,0.03)":"transparent"};border:1px solid ${isOpen?"rgba(255,255,255,0.07)":"transparent"};margin-bottom:${isOpen?"8px":"0"};transition:all 0.2s">
      ${isOpen?`<div style="position:relative;height:160px;overflow:hidden"><img src="${ev.photo}" alt="" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;opacity:0.65"/><div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,15,0.9) 0%,transparent 55%)"></div><div style="position:absolute;top:10px;left:12px;padding:4px 10px;border-radius:999px;background:rgba(0,0,0,0.5);color:${meta.color};font-size:11px;font-weight:700">${san(ev.type)}</div>${ev.isWeekend?`<div style="position:absolute;top:10px;right:12px;padding:4px 10px;border-radius:999px;background:rgba(99,102,241,0.7);color:#fff;font-size:11px;font-weight:700">This Weekend</div>`:""}</div>`:""}
      <div class="card-row" data-id="${ev.id}" style="display:flex;align-items:center;gap:12px;padding:14px 2px;cursor:pointer;border-bottom:${idx<filtered.length-1&&!isOpen?"1px solid rgba(255,255,255,0.04)":"none"}">
        <div style="width:44px;height:44px;border-radius:12px;background:${meta.color}12;border:1px solid ${meta.color}20;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:${meta.color}">${meta.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;flex-wrap:wrap">
            <span style="font-size:10px;font-weight:700;color:${meta.color};text-transform:uppercase;letter-spacing:0.8px">${ev.type}</span>
            ${ev.isWeekend?`<span style="font-size:9px;font-weight:600;color:#a5b4fc;background:rgba(99,102,241,0.1);padding:1px 5px;border-radius:3px">Weekend</span>`:""}
            ${ev.cost==="Free"?`<span style="font-size:9px;font-weight:600;color:#6ee7b7;background:rgba(16,185,129,0.08);padding:1px 5px;border-radius:3px">Free</span>`:""}
          </div>
          <div style="font-weight:600;font-size:14px;color:#f1f5f9;line-height:1.3;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${san(ev.name)}</div>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:11px;color:${ev.date==="Today"||ev.date==="Tomorrow"?"#a5b4fc":"rgba(255,255,255,0.3)"};font-weight:${ev.date==="Today"||ev.date==="Tomorrow"?600:400}">${formatDate(ev.date)}</span>
            <span style="font-size:11px;color:rgba(255,255,255,0.15);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">· ${san(ev.location)}</span>
          </div>
          ${ev.address&&ev.address!==ev.location?`<div style="font-size:10px;color:rgba(255,255,255,0.12);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📍 ${san(ev.address)}</div>`:""}
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:7px;flex-shrink:0">
          <div class="fav-btn" data-id="${ev.id}" style="font-size:15px;cursor:pointer;opacity:${isFav?1:0.2};color:${isFav?"#fbbf24":"#fff"}">${isFav?"★":"☆"}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.15);transform:${isOpen?"rotate(180deg)":"rotate(0deg)"};transition:transform 0.2s">▾</div>
        </div>
      </div>
      ${isOpen?`
      <div style="padding:2px 14px 16px;animation:fadeIn 0.2s ease">
        <div style="display:flex;gap:8px;margin-bottom:12px">
          ${ev.weather?`<div style="flex:1;background:rgba(255,255,255,0.03);border-radius:10px;padding:8px 12px;border:1px solid rgba(255,255,255,0.05)"><div style="font-size:9px;color:rgba(255,255,255,0.2);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.5px">Weather</div><div style="font-size:13px;font-weight:600;color:#f1f5f9">${ev.weather.i} ${ev.weather.l} · ${ev.weather.t}</div></div>`:""}
          <div style="flex:1;background:${meta.color}08;border-radius:10px;padding:8px 12px;border:1px solid ${meta.color}15"><div style="font-size:9px;color:rgba(255,255,255,0.2);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.5px">Cost</div><div style="font-size:13px;font-weight:700;color:${meta.color}">${san(ev.cost)}</div></div>
          <div style="flex:1;background:rgba(255,255,255,0.03);border-radius:10px;padding:8px 12px;border:1px solid rgba(255,255,255,0.05)"><div style="font-size:9px;color:rgba(255,255,255,0.2);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.5px">Date</div><div style="font-size:12px;font-weight:600;color:#f1f5f9">${new Date((ev.date||"")+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div></div>
        </div>
        ${ev.desc?`<p style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.65;margin-bottom:12px">${san(ev.desc)}</p>`:""}
        ${ev.address?`<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.address)}" target="_blank" style="display:block;font-size:11px;color:rgba(99,162,255,0.6);margin-bottom:12px;text-decoration:none">📍 ${san(ev.address)} <span style="font-size:10px;opacity:0.6">↗ Maps</span></a>`:""}
        ${ev.source&&ev.source!=="Local"?`<div style="font-size:10px;color:rgba(255,255,255,0.12);margin-bottom:10px">Data provided by ${ev.source}</div>`:""}
        
        <!-- Reviews Section -->
        <div style="margin-bottom:14px">
          <div style="font-size:9px;color:rgba(255,255,255,0.15);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.8px">Reviews</div>
          
          <!-- Existing reviews -->
          ${(state.reviews[ev.id]||[]).length > 0 ? 
            (state.reviews[ev.id]||[]).map(r=>`
              <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:10px 12px;margin-bottom:6px;border:1px solid rgba(255,255,255,0.05)">

                  <span style="color:#fbbf24;font-size:12px">${"★".repeat(r.rating)}${"☆".repeat(5-r.rating)}</span>
                  <span style="font-size:10px;color:rgba(255,255,255,0.2)">${new Date(r.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                </div>
                ${r.comment?`<p style="font-size:12px;color:rgba(255,255,255,0.4);line-height:1.5">${san(r.comment)}</p>`:""}
              </div>
            `).join("") 
            : `<p style="font-size:12px;color:rgba(255,255,255,0.2);margin-bottom:10px">No reviews yet. Be the first!</p>`

          <!-- Write a review -->

              ${[1,2,3,4,5].map(star=>`

            </div>
            <!-- Comment input -->
            <textarea class="review-text" data-id="${ev.id}" 
              placeholder="What did you think? (optional)"
              style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 10px;font-size:12px;color:#fff;resize:none;height:60px;font-family:inherit;outline:none;margin-bottom:8px"
            >${state.reviewInput[ev.id]?.comment||""}</textarea>
            <!-- Submit -->
            <div class="submit-review" data-id="${ev.id}" data-name="${san(ev.name)}"
              style="padding:8px 14px;border-radius:8px;background:${(state.reviewInput[ev.id]?.rating||0)>0?"rgba(99,102,241,0.8)":"rgba(255,255,255,0.06)"};color:${(state.reviewInput[ev.id]?.rating||0)>0?"#fff":"rgba(255,255,255,0.2)"};font-size:12px;font-weight:600;text-align:center;cursor:${(state.reviewInput[ev.id]?.rating||0)>0?"pointer":"default"}">
              ${state.reviewLoading[ev.id]?"Submitting…":"Submit Review"}
            </div>
          </div>
        </div>
        ${ev.sched&&ev.sched.length?`
          <div style="font-size:9px;color:rgba(255,255,255,0.15);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.8px">Schedule</div>
          ${ev.sched.map((s,i)=>{const p=s.split(" · ");return`<div style="display:flex;gap:12px;padding:7px 0;border-bottom:${i<ev.sched.length-1?"1px solid rgba(255,255,255,0.04)":"none"}"><span style="font-size:11px;color:${meta.color};min-width:68px;font-weight:600">${p[0]}</span><span style="font-size:11px;color:rgba(255,255,255,0.35)">${san(p[1]||"")}</span></div>`;}).join("")}`:""}

          ${ev.url?`<a href="${ev.url}" target="_blank" style="flex:1;padding:10px;border-radius:10px;background:${meta.color}12;color:${meta.color};font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:1px solid ${meta.color}20;text-decoration:none">🎟 Tickets</a>`:""}
          <div class="share-btn" data-name="${encodeURIComponent(ev.name)}" data-date="${formatDate(ev.date)}" data-loc="${encodeURIComponent(ev.location)}" data-cost="${ev.cost}" data-url="${ev.url||""}" style="flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.08)">Share ↗</div>
        </div>
      </div>`:""}
    </div>`;
  }).join("");

  return`
  ${state.toast?`<div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:2000;background:rgba(255,255,255,0.1);backdrop-filter:blur(12px);color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,0.15);white-space:nowrap">${state.toast}</div>`:""}
  <div style="min-height:100vh;background:#0a0a0f;color:#fff">

        ${weekendCount?`<span style="padding:3px 9px;border-radius:6px;background:rgba(99,102,241,0.07);color:#a5b4fc;font-size:11px;font-weight:500">${weekendCount} this weekend</span>`:""}

            <span style="font-size:11px;font-weight:600;color:rgba(168,85,247,0.8)">RapidAPI</span>
          </a>
          <a href="https://unsplash.com" target="_blank" style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);text-decoration:none">
            <span style="font-size:14px">📸</span>
            <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.4)">Unsplash</span>
          </a>
        </div>
        <div style="text-align:center;margin-top:12px">
          <span style="font-size:10px;color:rgba(255,255,255,0.1)">Event data provided by third-party sources. Buzz is not responsible for event accuracy. © 2026 Buzz</span>
        </div>
      </div>

    </div>
  </div>`;
}

function renderSuggestions(sugg){
  let c=document.getElementById("suggestions-container");
  if(!c)return;
  if(!sugg||!sugg.length){c.innerHTML="";return;}
  c.innerHTML=`<div style="background:rgba(15,15,20,0.98);border:1px solid rgba(255,255,255,0.07);border-radius:12px;margin-bottom:12px;overflow:hidden;animation:fadeIn 0.15s ease">
    ${sugg.map(s=>`<div class="suggestion-item" data-city="${s.city}" data-state="${s.state}" data-zip="${s.zip}" data-region="${s.region||'DEFAULT'}"
      style="padding:11px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.04)">
      <span style="font-size:14px;color:#f1f5f9;font-weight:500">${s.city}, ${s.state}</span>
      <span style="font-size:11px;color:rgba(255,255,255,0.2)">${s.zip}</span>
    </div>`).join("")}
  </div>`;
  c.querySelectorAll(".suggestion-item").forEach(el=>{
    el.addEventListener("click",()=>{
      const r={city:el.dataset.city,state:el.dataset.state,zip:el.dataset.zip,region:el.dataset.region};
      state.searchInput=r.city+", "+r.state;
      state.suggestions=[];
      c.innerHTML="";
      doSearch(r.city,r);
    });
  });
}

function bindEvents(){
  const gps=document.getElementById("gps-btn");
  if(gps)gps.addEventListener("click",detectLocation);

  const inp=document.getElementById("search-input");
  if(inp){
    inp.addEventListener("input",e=>{
      const v=e.target.value;
      state.searchInput=v;
      state.searchError="";
      const sugg=getSuggestions(v);
      state.suggestions=sugg;
      renderSuggestions(sugg);
    });
    inp.addEventListener("keydown",e=>{
      if(e.key==="Enter"){state.suggestions=[];renderSuggestions([]);doSearch(state.searchInput);}
    });
  }

  const go=document.getElementById("search-go");
  if(go)go.addEventListener("click",()=>{state.suggestions=[];renderSuggestions([]);doSearch(state.searchInput);});

  // Who filter on home
  document.querySelectorAll(".who-btn").forEach(el=>{
    el.addEventListener("click",()=>setState({whoFilter:el.dataset.who}));
  });
  // Date range on home
  document.querySelectorAll(".range-btn").forEach(el=>{
    el.addEventListener("click",()=>{state.dateRange=el.dataset.range;render();});
  });
  // Quick cities
  document.querySelectorAll(".quick-city").forEach(el=>{
    el.addEventListener("click",()=>{
      const c=el.dataset.city;
      state.searchInput=c;
      doSearch(c);
    });
  });

  // Results filters
  const back=document.getElementById("back-btn");
  if(back)back.addEventListener("click",()=>setState({screen:"home",zip:"",events:[],info:null,openId:null,searchInput:"",suggestions:[]}));
  const ns=document.getElementById("new-search-btn");
  if(ns)ns.addEventListener("click",()=>setState({screen:"home",zip:"",events:[],info:null,openId:null,searchInput:"",suggestions:[]}));
  document.querySelectorAll(".card-row").forEach(el=>{el.addEventListener("click",()=>{const id=el.dataset.id;setState({openId:state.openId===id?null:id});});});
  document.querySelectorAll(".fav-btn").forEach(el=>{el.addEventListener("click",e=>{e.stopPropagation();const id=el.dataset.id;const f=new Set(state.favs);f.has(id)?f.delete(id):f.add(id);setState({favs:f});});});
  document.querySelectorAll(".type-filter").forEach(el=>{
    el.addEventListener("click",()=>{state.typeFilter=el.dataset.type;render();});
  });
  document.querySelectorAll(".who-filter").forEach(el=>{
    el.addEventListener("click",()=>{state.whoFilter=el.dataset.who;render();});
  });
  document.querySelectorAll(".range-filter").forEach(el=>{
    el.addEventListener("click",()=>{
      state.dateRange=el.dataset.range;
      // Only re-render the results, don't reset filters or scroll
      render();
    });
  });
  document.querySelectorAll(".toggle-free").forEach(el=>{
    el.addEventListener("click",()=>{state.freeOnly=!state.freeOnly;render();});
  });
  document.querySelectorAll(".clear-all").forEach(el=>{el.addEventListener("click",()=>{state.typeFilter="All";state.whoFilter="all";state.freeOnly=false;state.dateRange="3months";render();});});
  document.querySelectorAll(".cal-btn").forEach(el=>{el.addEventListener("click",()=>{const d=(el.dataset.date||"").replace(/-/g,"");if(d)window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${el.dataset.name}&dates=${d}/${d}&location=${el.dataset.addr}`,"_blank");});});
  document.querySelectorAll(".share-btn").forEach(el=>{
    el.addEventListener("click",()=>{
      const name=decodeURIComponent(el.dataset.name);
      const date=el.dataset.date;
      const loc=decodeURIComponent(el.dataset.loc);
      const cost=el.dataset.cost;
      const url=el.dataset.url||"";
      const txt=`${name} — ${date} at ${loc}. ${cost==="Free"?"It's free! ":""}Check it out on Buzz 🎉`;
      if(navigator.share){
        navigator.share({
          title:name,
          text:txt,
          url:url||window.location.href
        });
      } else {
        const copyText=url?`${txt}
${url}`:txt;
        navigator.clipboard?.writeText(copyText);
        showToast("📋 Copied to clipboard!");
      }
    });
  });

  // ── Review handlers ──────────────────────────────────────────────────────
  document.querySelectorAll(".star-btn").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=el.dataset.id;
      const star=parseInt(el.dataset.star);
      state.reviewInput={...state.reviewInput,[id]:{...(state.reviewInput[id]||{}),rating:star}};
      render();
    });
  });

  document.querySelectorAll(".review-text").forEach(el=>{
    el.addEventListener("input",e=>{
      const id=el.dataset.id;
      state.reviewInput={...state.reviewInput,[id]:{...(state.reviewInput[id]||{}),comment:e.target.value}};
    });
  });

  document.querySelectorAll(".submit-review").forEach(el=>{
    el.addEventListener("click",async()=>{
      const id=el.dataset.id;
      const name=el.dataset.name;
      const input=state.reviewInput[id]||{};
      if(!input.rating)return;
      state.reviewLoading={...state.reviewLoading,[id]:true};
      render();
      const ok=await submitReview(id,name,input.rating,input.comment||"");
      if(ok){
        // Add review locally so it shows immediately
        const newReview={event_id:id,event_name:name,rating:input.rating,comment:input.comment||"",created_at:new Date().toISOString()};
        state.reviews={...state.reviews,[id]:[newReview,...(state.reviews[id]||[])]};
        state.reviewInput={...state.reviewInput,[id]:{rating:0,comment:""}};
        state.reviewLoading={...state.reviewLoading,[id]:false};
        showToast("✓ Review submitted!");
      } else {
        // Save locally even without Supabase
        const newReview={event_id:id,event_name:name,rating:input.rating,comment:input.comment||"",created_at:new Date().toISOString()};
        state.reviews={...state.reviews,[id]:[newReview,...(state.reviews[id]||[])]};
        state.reviewInput={...state.reviewInput,[id]:{rating:0,comment:""}};
        state.reviewLoading={...state.reviewLoading,[id]:false};
        showToast("✓ Review saved!");
      }
      render();
    });
  });

  // Load reviews for open event
  if(state.openId && !state.reviews[state.openId]){
    fetchReviews(state.openId).then(reviews=>{
      if(reviews.length>0){
        state.reviews={...state.reviews,[state.openId]:reviews};
        render();
      }
    });
  }
}

render();
</script>
</body>
</html>
